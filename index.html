<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 업무 트래커</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#378ADD;--c1bg:#E6F1FB;--c1t:#0C447C;
  --c2:#1D9E75;--c2bg:#E1F5EE;--c2t:#085041;
  --c3:#D4537E;--c3bg:#FBEAF0;--c3t:#72243E;
  --c4:#BA7517;--c4bg:#FAEEDA;--c4t:#633806;
  --c5:#888780;--c5bg:#F4F3EE;--c5t:#444441;
  --c6:#7F77DD;--c6bg:#EEEDFE;--c6t:#3C3489;
  --bg:#ffffff;
  --bg-sub:#f8f9fb;
  --bg-hover:#f3f4f6;
  --border:#e8eaed;
  --border-light:#f0f1f3;
  --text:#111827;
  --text-2:#6b7280;
  --text-3:#9ca3af;
  --accent:#4264FB;
  --accent-bg:#EEF2FF;
  --today-bg:#f0f5ff;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --radius:10px;--radius-sm:7px;--radius-xs:5px;
}
body{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}

.app{display:grid;grid-template-rows:56px 1fr;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border);background:var(--bg);gap:16px}
.tb-brand{font-size:15px;font-weight:600;letter-spacing:-.3px;padding-right:16px;border-right:1px solid var(--border);white-space:nowrap}
.tb-tabs{display:flex;gap:1px;flex:1}
.tb-tab{padding:7px 14px;font-size:13px;font-weight:400;border:none;background:none;color:var(--text-2);cursor:pointer;border-radius:var(--radius-xs);transition:all .15s;font-family:'DM Sans',sans-serif}
.tb-tab:hover{background:var(--bg-hover);color:var(--text)}
.tb-tab.on{background:var(--bg-hover);color:var(--text);font-weight:500}
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.yr-nav{display:flex;align-items:center;gap:6px}
.yr-btn{border:1px solid var(--border);background:none;border-radius:var(--radius-xs);padding:4px 9px;cursor:pointer;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;transition:background .12s}
.yr-btn:hover{background:var(--bg-hover)}
.yr-val{font-weight:500;font-size:13px;min-width:38px;text-align:center}

.body{display:grid;grid-template-columns:172px 1fr;overflow:hidden}
.side{border-right:1px solid var(--border);padding:16px 10px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;background:#F4F5F7}
.s-label{font-size:10px;letter-spacing:.07em;color:var(--text-3);text-transform:uppercase;padding:0 6px;margin-bottom:6px;font-weight:600}
.m-btn{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius-sm);border:none;background:none;width:100%;cursor:pointer;text-align:left;transition:background .12s;font-family:'DM Sans',sans-serif}
.m-btn:hover{background:rgba(0,0,0,.06)}
.m-btn.sel{background:rgba(0,0,0,.08)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
.m-name{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.m-cnt{font-size:10px;color:var(--text-3);background:var(--bg-sub);border-radius:9px;padding:1px 6px}
.add-m{width:100%;padding:6px;border:1px dashed var(--border);border-radius:var(--radius-sm);background:none;color:var(--text-3);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.add-m:hover{border-color:var(--text-3);color:var(--text-2);background:rgba(0,0,0,.04)}
.cat-item{display:flex;align-items:center;gap:6px;padding:3px 6px;font-size:11px;color:var(--text-2)}
.cat-item:hover .cat-edit-btn{opacity:1!important}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.panel{overflow-y:auto;height:calc(100vh - 56px)}
.v-annual,.v-daily,.v-team,.v-project{display:none}
.v-annual.on,.v-daily.on,.v-team.on,.v-project.on{display:block}
.v-team.on{display:flex;flex-direction:column;height:calc(100vh - 56px);overflow:hidden}

/* toggle */
.view-toggle{display:flex;gap:2px;background:var(--bg-sub);border-radius:var(--radius-sm);padding:3px;border:1px solid var(--border)}
.vt-btn{padding:4px 12px;font-size:12px;border:none;background:none;border-radius:var(--radius-xs);cursor:pointer;color:var(--text-2);font-family:'DM Sans',sans-serif;transition:all .12s}
.vt-btn.on{background:var(--bg);color:var(--text);font-weight:500;box-shadow:var(--shadow)}

/* annual */
.annual-wrap{padding:20px 24px}
.annual-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.annual-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mb{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.mb:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.mb-title{font-size:11px;font-weight:500;color:var(--text-2);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.mb-cnt{font-size:10px;color:var(--text-3);font-weight:400;background:var(--bg-sub);padding:1px 6px;border-radius:8px}
.dg{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.dl{font-size:8px;color:var(--text-3);text-align:center;padding-bottom:3px}
.dc{position:relative;display:flex;flex-direction:column;align-items:stretch;font-size:8px;color:var(--text-3);border-radius:3px;cursor:pointer;overflow:hidden;padding:3px 2px 2px;min-height:28px}
.dc:hover{outline:1px solid var(--accent);background:var(--bg-hover)}
.dc.tod{outline:2px solid var(--accent)!important;font-weight:700;z-index:2}
.dc.tod .dc-num{color:var(--accent)}
.dc.hw .dc-num{font-weight:600;color:var(--text)}
.dc-num{position:relative;z-index:2;pointer-events:none;line-height:1;text-align:center;font-size:8px;margin-bottom:2px}
.dc-bg{display:none}
.dc .dr{display:none}
.dd{width:2px;height:2px;border-radius:50%}
.dc-proj-dots{display:flex;flex-direction:column;gap:2px;width:100%;z-index:2}
.dc-proj-item{display:flex;align-items:center;gap:2px;width:100%;overflow:hidden}
.dc-proj-dot{width:3px;height:3px;border-radius:50%;flex-shrink:0}
.dc-proj-name{font-size:6px;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;line-height:1.2;font-weight:500}

/* member filter */
.member-filter{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.mf-pill{display:flex;align-items:center;gap:4px;padding:4px 10px 4px 6px;border-radius:20px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:11px;color:var(--text-2);white-space:nowrap;transition:all .12s}
.mf-pill:hover{border-color:var(--text-2);color:var(--text)}
.mf-pill.on{border-color:var(--accent);color:var(--accent);font-weight:500;background:var(--accent-bg)}
.mf-av{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:600;flex-shrink:0}

/* member annual section */
.member-annual-section{margin-bottom:22px}
.mas-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.mas-name{font-size:13px;font-weight:500}
.mas-proj-pills{display:flex;gap:4px;flex-wrap:wrap}
.mas-pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.mas-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.mas-mb{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px;cursor:pointer;transition:border-color .12s}
.mas-mb:hover{border-color:var(--accent)}
.mas-mb-title{font-size:10px;font-weight:500;color:var(--text-2);margin-bottom:5px}
.mas-dg{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.mas-dc{position:relative;border-radius:2px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;align-items:stretch;padding:3px 2px 2px;min-height:24px}
.mas-dc:hover{outline:1px solid var(--accent);background:var(--bg-hover)}
.mas-dc.tod{outline:2px solid var(--accent)!important}
.mas-dc.tod .mas-dc-num{color:var(--accent);font-weight:700}
.mas-dc-bg{display:none}
.mas-dc-num{position:relative;z-index:2;font-size:7px;color:var(--text-3);text-align:center;line-height:1;margin-bottom:2px}
.mas-dc.hw .mas-dc-num{color:var(--text);font-weight:600}
.mas-dc-proj-dots{display:flex;flex-direction:column;gap:2px;width:100%;z-index:2}
.mas-dc-proj-item{display:flex;align-items:center;gap:2px;width:100%;overflow:hidden}
.mas-dc-proj-dot{width:3px;height:3px;border-radius:50%;flex-shrink:0}
.mas-dc-proj-name{font-size:6px;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;line-height:1.2;font-weight:500}

/* proj legend */
.proj-legend-inline{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pli{display:flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:var(--radius-xs);background:var(--bg-sub);border:1px solid var(--border)}
.pli-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* monthly */
.monthly-header{display:flex;align-items:center;gap:8px}
.mo-nav{border:1px solid var(--border);background:none;border-radius:var(--radius-sm);padding:5px 11px;font-size:12px;cursor:pointer;color:var(--text);font-family:'DM Sans',sans-serif;transition:background .12s}
.mo-nav:hover{background:var(--bg-hover)}
.mo-title{font-size:15px;font-weight:500}
.gantt-wrap{margin-top:6px}
.gantt-header{display:flex;align-items:center;margin-bottom:4px}
.gantt-name-col{width:88px;flex-shrink:0;font-size:11px;font-weight:500;color:var(--text-2)}
.gantt-day-lbl{flex:1;text-align:center;font-size:8px;color:var(--text-3)}
.gantt-day-lbl.today-lbl{color:var(--accent);font-weight:700}
.gantt-row{display:flex;align-items:flex-start;margin-bottom:3px}
.gantt-member-name{width:88px;flex-shrink:0;font-size:11px;display:flex;align-items:center;gap:5px;overflow:hidden;padding-top:3px}
.gantt-track{flex:1;position:relative;border-radius:4px;overflow:hidden}
.gantt-bar{position:absolute;top:2px;height:14px;border-radius:3px;display:flex;align-items:center;padding:0 6px;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;color:#fff;font-weight:500}
.gantt-bar:hover{opacity:.85}
.month-cal-wrap{display:grid;grid-template-columns:1fr 200px;gap:14px;align-items:start}
.month-cal{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.mcal-head{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)}
.mcal-dl{padding:6px 0;font-size:10px;color:var(--text-2);text-align:center;font-weight:500}
.mcal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.mdc{aspect-ratio:1;border-right:1px solid var(--border-light);border-bottom:1px solid var(--border-light);padding:4px;cursor:pointer;position:relative;overflow:hidden;transition:background .12s;display:flex;flex-direction:column}
.mdc:hover{background:var(--bg-sub)}
.mdc:nth-child(7n){border-right:none}
.mdc.empty{background:var(--bg-sub);cursor:default}
.mdc.tod{background:var(--today-bg)}
.mdc-num{font-size:10px;font-weight:500;color:var(--text-2);margin-bottom:2px}
.mdc.tod .mdc-num{color:var(--accent);font-weight:700}
.mdc-proj-bar{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4;font-weight:500}
.mdc-work-dots{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap}
.mdc-more{font-size:9px;color:var(--text-3);font-weight:500}
.mo-detail{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.mo-det-title{font-size:12px;font-weight:500;margin-bottom:8px;color:var(--text-2)}
.mo-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.mo-stat{background:var(--bg-sub);border-radius:var(--radius-sm);padding:8px 9px}
.mo-stat-l{font-size:10px;color:var(--text-2);margin-bottom:2px}
.mo-stat-v{font-size:17px;font-weight:600}
.pl-item{display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:6px}
.pl-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.pl-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.pl-dur{font-size:10px;color:var(--text-3);white-space:nowrap}

/* project tab */
.proj-wrap{padding:20px 24px}
.proj-filterbar{display:flex;flex-direction:column;gap:8px;padding:12px 14px;background:var(--bg-sub);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}
.proj-filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pf-label{font-size:10px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;min-width:40px;flex-shrink:0}
.pf-pill{padding:3px 10px;border-radius:14px;border:1px solid var(--border);background:var(--bg);font-size:11px;color:var(--text-2);cursor:pointer;transition:all .12s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.pf-pill:hover{border-color:var(--text-2);color:var(--text)}
.pf-pill.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);font-weight:500}
.pf-pill-mem{display:flex;align-items:center;gap:4px;padding:2px 8px 2px 3px;border-radius:14px;border:1px solid var(--border);background:var(--bg);font-size:11px;color:var(--text-2);cursor:pointer;transition:all .12s}
.pf-pill-mem:hover{border-color:var(--text-2);color:var(--text)}
.pf-pill-mem.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);font-weight:500}
.pf-pill-cat{display:flex;align-items:center;gap:5px;padding:3px 10px 3px 7px;border-radius:14px;border:1px solid var(--border);background:var(--bg);font-size:11px;color:var(--text-2);cursor:pointer;transition:all .12s}
.pf-pill-cat:hover{border-color:var(--text-2);color:var(--text)}
.pf-pill-cat.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);font-weight:500}
.proj-cal-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--text-3);padding:2px 6px;border-radius:4px;background:var(--bg-sub)}
.proj-section{margin-bottom:22px}
.proj-sec-title{font-size:13px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.proj-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:13px;transition:box-shadow .15s}
.proj-card:hover{box-shadow:var(--shadow-md)}
.proj-card-color{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.proj-card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.proj-card-name{font-size:13px;font-weight:500;flex:1}
.proj-card-dates{font-size:11px;color:var(--text-2);margin-bottom:8px}
.proj-members{display:flex;gap:3px;flex-wrap:wrap}
.proj-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600}
.del-proj{background:none;border:none;cursor:pointer;font-size:11px;color:var(--text-3);padding:2px 5px;border-radius:4px;transition:all .12s}
.del-proj:hover{background:var(--bg-sub);color:var(--text-2)}

/* daily */
.daily-wrap{max-width:600px;padding:20px 24px}
.dh{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.d-nav{border:1px solid var(--border);background:none;border-radius:var(--radius-sm);padding:5px 10px;font-size:12px;cursor:pointer;color:var(--text);font-family:'DM Sans',sans-serif;transition:background .12s}
.d-nav:hover{background:var(--bg-hover)}
.d-title{font-size:16px;font-weight:600}
.d-sub{font-size:11px;color:var(--text-2)}
.inp-box{background:var(--bg-sub);border-radius:var(--radius);padding:12px;margin-bottom:14px;border:1px solid var(--border)}
.inp-row{display:flex;gap:6px;margin-bottom:6px}
.inp-row:last-child{margin-bottom:0}
.sel{border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 8px;font-size:12px;background:var(--bg);color:var(--text);height:32px;font-family:'DM Sans',sans-serif}
.wta{flex:1;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;font-size:12px;background:var(--bg);color:var(--text);height:32px;resize:none;font-family:'DM Sans',sans-serif;transition:border-color .12s}
.wta:focus{outline:none;border-color:var(--accent)}
.ab{padding:5px 14px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;height:32px;white-space:nowrap;font-family:'DM Sans',sans-serif;font-weight:500;transition:opacity .12s}
.ab:hover{opacity:.82}
.wi{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px;transition:box-shadow .12s}
.wi:hover{box-shadow:var(--shadow)}
.cbadge{font-size:10px;padding:2px 7px;border-radius:9px;flex-shrink:0;margin-top:1px;font-weight:500}
.wi-text{font-size:12px;flex:1;line-height:1.5}
.xbtn{background:none;border:none;cursor:pointer;font-size:11px;color:var(--text-3);padding:2px 4px;border-radius:4px;margin-left:auto;transition:all .12s}
.xbtn:hover{background:var(--bg-sub);color:var(--text-2)}
.empty{text-align:center;padding:28px;color:var(--text-2);font-size:12px;line-height:1.9}

/* ── TEAM VIEW (Vocale-style) ── */
.team-cal-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.tcal-nav-group{display:flex;align-items:center;gap:8px}
.tcal-nav-btn{border:1px solid var(--border);background:none;border-radius:var(--radius-sm);width:28px;height:28px;cursor:pointer;font-size:15px;color:var(--text-2);display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;transition:all .12s}
.tcal-nav-btn:hover{background:var(--bg-hover);color:var(--text)}
.tcal-range{font-size:14px;font-weight:500}
.tcal-today{padding:5px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:none;font-size:12px;cursor:pointer;color:var(--text-2);font-family:'DM Sans',sans-serif;transition:all .12s}
.tcal-today:hover{background:var(--bg-hover);color:var(--text)}
.tcal-stats{display:flex;align-items:center;gap:16px}
.tcal-stat{font-size:12px;color:var(--text-2)}
.tcal-stat b{color:var(--text);font-weight:600}
.team-cal-body{flex:1;overflow:auto}
.team-cal-table{width:100%;border-collapse:collapse;table-layout:fixed}

/* sticky header row */
.team-head-th{padding:14px 10px 12px;text-align:center;border-bottom:1px solid var(--border);border-left:1px solid var(--border-light);background:var(--bg);position:sticky;top:0;z-index:10}
.team-head-corner{position:sticky;top:0;left:0;z-index:15;background:var(--bg);border-bottom:1px solid var(--border);width:60px}
.mch-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;margin:0 auto 6px}
.mch-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap}

/* day rows */
.day-label-td{width:60px;padding:12px 10px 12px 14px;vertical-align:top;border-right:1px solid var(--border);border-bottom:1px solid var(--border-light);background:var(--bg);position:sticky;left:0;z-index:5;text-align:right}
.day-num{font-size:22px;font-weight:300;color:var(--text);line-height:1}
.day-kr{font-size:10px;font-weight:500;color:var(--text-3);text-transform:uppercase;margin-top:2px}
.day-label-td.is-today .day-num{color:var(--accent);font-weight:600}

/* ── SUPABASE PERSISTENT STORAGE ── */
const SUPABASE_URL='https://vgekouqzawikfrotqzwm.supabase.co';
const SUPABASE_KEY='sb_publishable_lBq4Nmu2iCZiN3C2YV3bYQ_crp4wSHx';

async function sbGet(key){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/kv_store?key=eq.${key}&select=value`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    const d=await r.json();
    return d&&d.length?JSON.parse(d[0].value):null;
  }catch(e){return null}
}
async function sbSet(key,value){
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/kv_store`,{
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({key,value:JSON.stringify(value)})
    });
  }catch(e){}
}

function dk(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function today(){return new Date().toISOString().slice(0,10)}
function gw(ds,mid){return S.works[`${mid}::${ds}`]||[]}
function gaw(ds){let a=[];S.members.forEach(m=>gw(ds,m.id).forEach(w=>a.push({...w,memberId:m.id,memberName:m.name})));return a}
function ac(idx){return AVC[idx%AVC.length]}
function gc(id){return S.categories.find(c=>c.id===id)||S.categories[S.categories.length-1]||{id:'etc',l:'기타',hx:'#888780',bg:'#F4F3EE',t:'#444441'}}
function dim(y,m){return new Date(y,m+1,0).getDate()}
function fdm(y,m){return new Date(y,m,1).getDay()}
function midx(mid){return S.members.findIndex(m=>m.id===mid)}
function projsOnDate(ds,memberIds){
  return S.projects.filter(p=>{
    if(ds<p.start||ds>p.end) return false;
    if(!memberIds) return true;
    return p.members.some(mid=>memberIds.includes(mid));
  });
}
function projsInMonth(y,m,memberIds){
  const s=dk(y,m,1),e=dk(y,m,dim(y,m));
  return S.projects.filter(p=>{
    if(p.start>e||p.end<s) return false;
    if(!memberIds) return true;
    return p.members.some(mid=>memberIds.includes(mid));
  });
}
function hexRgb(hex){const h=hex.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]}
function rgbToHex(c){
  // 이미 hex면 그대로 반환, rgb(...)이면 변환
  if(!c||c.startsWith('#')) return c;
  const m=c.match(/rgb[a]?\(\s*(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
  if(!m) return c;
  return'#'+[m[1],m[2],m[3]].map(v=>parseInt(v).toString(16).padStart(2,'0')).join('');
}
function stripeGradient(colors){
  if(!colors.length) return null;
  const hexColors=colors.map(rgbToHex);
  if(hexColors.length===1) return{bg:hexColors[0]+'40',single:true};
  const n=hexColors.length,stops=[];
  hexColors.forEach((c,i)=>{const a=Math.round((i/n)*100),b=Math.round(((i+1)/n)*100);stops.push(`${c}55 ${a}%`,`${c}55 ${b}%`)});
  return{bg:`linear-gradient(135deg,${stops.join(',')})`,single:false};
}
function getFilterIds(){return S.annualFilter.size===0?null:[...S.annualFilter]}

/* ── TEAM VIEW (Vocale-style week × member grid) ── */
function rTeam(){
  const el=document.getElementById('vt');
  const td=today();

  // Compute Monday of the offset week
  const base=new Date(td+'T00:00:00');
  base.setDate(base.getDate()+S.teamWeekOffset*7);
  const dow=base.getDay();
  const monday=new Date(base);
  monday.setDate(base.getDate()-(dow===0?6:dow-1));

  const weekDates=[];
  for(let i=0;i<7;i++){
    const dt=new Date(monday);dt.setDate(monday.getDate()+i);
    weekDates.push(dt.toISOString().slice(0,10));
  }

  const fmt=ds=>ds.slice(5).replace('-','/');
  const wLabel=`${weekDates[0].slice(0,4)}년  ${fmt(weekDates[0])} — ${fmt(weekDates[6])}`;
  const dayKR=['월','화','수','목','금','토','일'];

  const totalWorks=Object.values(S.works).reduce((s,a)=>s+a.length,0);
  const todayWorks=S.members.reduce((s,m)=>s+gw(td,m.id).length,0);
  const activeProjs=S.projects.filter(p=>p.start<=td&&p.end>=td).length;

  // Member column headers
  const memberHeads=S.members.map((m,i)=>{
    const c=ac(i);
    return`<th class="team-head-th">
      <div class="prof-av-btn" onclick="showProfile('${m.id}')" style="width:44px;height:44px;margin:0 auto 6px" title="프로필 설정">
        ${avHTML(m,44,14)}
        <div class="prof-av-overlay">설정</div>
      </div>
      <div class="mch-name">${m.name}</div>
    </th>`;
  }).join('');

  // Week rows
  const rows=weekDates.map((ds,di)=>{
    const isToday=ds===td;
    const cells=S.members.map(m=>{
      const ws=gw(ds,m.id);
      const projs=projsOnDate(ds,[m.id]);
      let cards='';
      projs.forEach(p=>{
        cards+=`<div class="tv-proj-card" style="background:${p.color}1A;border-left:3px solid ${p.color};color:${p.color}" title="${p.name}">${p.name}</div>`;
      });
      ws.forEach((w)=>{
        const cat=gc(w.catId);
        cards+=`<div class="tv-work-card" style="background:${cat.bg};color:${cat.t}">
          <span class="tv-card-cat">${cat.l}</span>
          <span class="tv-card-text">${w.text}</span>
        </div>`;
      });
      const addHint=!cards?`<div class="tv-add-hint">+ 추가</div>`:'';
      return`<td class="team-cell${isToday?' is-today':''}" onclick="openDayPop('${m.id}','${ds}',event)">${cards}${addHint}</td>`;
    }).join('');
    return`<tr>
      <td class="day-label-td${isToday?' is-today':''}">
        <div class="day-num">${ds.slice(8)}</div>
        <div class="day-kr">${dayKR[di]}</div>
      </td>
      ${cells}
    </tr>`;
  }).join('');

  el.innerHTML=`
    <div class="team-cal-topbar">
      <div class="tcal-nav-group">
        <button class="tcal-nav-btn" onclick="shiftTeamWeek(-1)">‹</button>
        <button class="tcal-nav-btn" onclick="shiftTeamWeek(1)">›</button>
        <span class="tcal-range">${wLabel}</span>
        <button class="tcal-today" onclick="resetTeamWeek()">오늘</button>
      </div>
      <div class="tcal-stats">
        <span class="tcal-stat"><b>${totalWorks}</b> 전체 업무</span>
        <span class="tcal-stat"><b>${todayWorks}</b> 오늘</span>
        <span class="tcal-stat"><b>${activeProjs}</b> 진행 프로젝트</span>
      </div>
    </div>
    <div class="team-cal-body">
      <table class="team-cal-table">
        <thead>
          <tr>
            <th class="team-head-corner"></th>
            ${memberHeads}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function buildLegend(filterIds){
  const activeProjs=S.projects.filter(p=>!filterIds||p.members.some(mid=>filterIds.includes(mid)));
  const projLegend=activeProjs.length
    ? activeProjs.map(p=>`<div class="pli"><div class="pli-dot" style="background:${p.color}"></div>${p.name}<span style="font-size:10px;color:var(--text-3)">${p.start.slice(5)}~${p.end.slice(5)}</span></div>`).join('')
    : `<span style="font-size:11px;color:var(--text-3)">프로젝트 없음</span>`;
  const catLegend=S.categories.map(c=>`<div class="pli"><div style="width:12px;height:4px;border-radius:2px;background:${c.hx};flex-shrink:0"></div>${c.l}</div>`).join('');
  return`<div style="display:flex;flex-direction:column;gap:8px">
    <div><div style="font-size:10px;color:var(--text-3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.05em">프로젝트 (날짜 셀 내 컬러 바)</div><div style="display:flex;gap:6px;flex-wrap:wrap">${projLegend}</div></div>
    <div><div style="font-size:10px;color:var(--text-3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.05em">카테고리 (하단 바)</div><div style="display:flex;gap:6px;flex-wrap:wrap">${catLegend}</div></div>
  </div>`;
}

function buildEvtList(year){
  const evts=S.events
    .filter(e=>e.date.startsWith(year+''))
    .sort((a,b)=>a.date.localeCompare(b.date));
  const td=today();
  const upcoming=evts.filter(e=>e.date>=td);
  const past=evts.filter(e=>e.date<td);

  function evtRow(e){
    const d=new Date(e.date+'T00:00:00');
    const label=`${e.date.slice(5).replace('-','/')} ${['일','월','화','수','목','금','토'][d.getDay()]}`;
    return`<div class="evt-item">
      <div class="evt-dot-lg" style="background:${e.color}"></div>
      <div class="evt-date">${label}</div>
      <div class="evt-title">${e.title}</div>
      <button class="evt-del" onclick="delEvt('${e.id}')">✕</button>
    </div>`;
  }

  if(!evts.length) return`<div class="evt-list">
    <div class="evt-list-title">
      <span>📌 주요 일정 <span style="font-size:11px;font-weight:400;color:var(--text-3)">0개</span></span>
      <button class="mbtn" style="font-size:11px;padding:4px 10px" onclick="openEvtPop('${td}',null)">+ 일정 추가</button>
    </div>
    <div class="evt-empty">등록된 주요 일정이 없습니다.<br>날짜 셀을 클릭해서 추가하세요.</div>
  </div>`;

  return`<div class="evt-list">
    <div class="evt-list-title">
      <span>📌 주요 일정 <span style="font-size:11px;font-weight:400;color:var(--text-3)">${evts.length}개</span></span>
      <button class="mbtn" style="font-size:11px;padding:4px 10px" onclick="openEvtPop('${td}',null)">+ 일정 추가</button>
    </div>
    ${upcoming.length?`<div style="font-size:10px;color:var(--text-3);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.05em">예정</div>${upcoming.map(evtRow).join('')}`:''}
    ${past.length?`<div style="font-size:10px;color:var(--text-3);margin:10px 0 6px;font-weight:500;text-transform:uppercase;letter-spacing:.05em">지난 일정</div>${past.map(evtRow).join('')}`:''}
  </div>`;
}

const EVT_COLORS=['#E24B4A','#378ADD','#1D9E75','#D4537E','#BA7517','#7F77DD','#639922','#0891B2','#C2410C','#7C3AED'];

function openEvtPop(ds, evt){
  if(evt) evt.stopPropagation();
  closePop();
  const d=new Date(ds+'T00:00:00');
  const dateLabel=`${ds.slice(5).replace('-','/')} ${['일','월','화','수','목','금','토'][d.getDay()]}`;
  const dayEvts=S.events.filter(e=>e.date===ds);
  const swatches=EVT_COLORS.map((c,i)=>`<div class="cp-swatch${i===0?' on':''}" style="background:${c};width:18px;height:18px;border-radius:3px" data-color="${c}" onclick="pickColor(this)"></div>`).join('');

  const existingItems=dayEvts.map(e=>`
    <div style="display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border-light)">
      <div style="width:8px;height:8px;border-radius:50%;background:${e.color};flex-shrink:0"></div>
      <span style="font-size:12px;flex:1">${e.title}</span>
      <button class="pop-del" onclick="delEvt('${e.id}')">✕</button>
    </div>`).join('');

  const pop=document.createElement('div');
  pop.id='day-pop';
  pop.innerHTML=`
    <div class="pop-header">
      <div style="font-size:16px">📌</div>
      <div style="flex:1"><div style="font-weight:500">주요 일정</div><div style="font-size:10px;color:var(--text-3)">${dateLabel}</div></div>
      <button class="pop-close" onclick="closePop()">✕</button>
    </div>
    ${dayEvts.length?`<div style="padding:8px 12px 4px">${existingItems}</div>`:''}
    <div style="padding:10px 12px;border-top:1px solid var(--border);background:var(--bg-sub)">
      <input id="pop-inp" class="pop-inp" placeholder="일정 제목 입력..." style="width:100%;margin-bottom:8px" onkeydown="if(event.key==='Enter')addEvt('${ds}')">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="evt-color-row" id="cp">${swatches}</div>
        <button class="pop-btn" onclick="addEvt('${ds}')">추가</button>
      </div>
    </div>`;

  // position: try to anchor near click target or center
  const vw=window.innerWidth,vh=window.innerHeight;
  let left=200,top=200;
  if(evt){
    const rect=evt.currentTarget?.getBoundingClientRect?.();
    if(rect){
      left=rect.left;top=rect.bottom+6;
      if(left+270>vw) left=Math.max(8,vw-274);
      if(top+240>vh) top=Math.max(8,rect.top-244);
    }
  }
  pop.style.cssText=`position:fixed;left:${left}px;top:${top}px;z-index:150;width:268px`;
  document.body.appendChild(pop);
  setTimeout(()=>document.getElementById('pop-inp')?.focus(),30);
  setTimeout(()=>document.addEventListener('click',_popOutside,{once:true}),10);
}

function addEvt(ds){
  const title=(document.getElementById('pop-inp')?.value||'').trim();if(!title)return;
  const swatchEl=document.querySelector('#day-pop .cp-swatch.on');
  const color=swatchEl?(swatchEl.dataset.color||swatchEl.style.background):EVT_COLORS[0];
  S.events.push({id:'ev'+Date.now(),date:ds,title,color});
  lsSaveEvents();closePop();rAnnual();
}

function delEvt(id){
  S.events=S.events.filter(e=>e.id!==id);
  lsSaveEvents();closePop();rAnnual();
}
function rMonthly(el,toggleHTML){
  const m=S.selMonth,y=S.year,td=today();
  const days=dim(y,m),fd=fdm(y,m);
  const filterIds=getFilterIds();
  let cells='';
  for(let i=0;i<fd;i++) cells+=`<div class="mdc empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=dk(y,m,d);
    const ws=filterIds?filterIds.flatMap(mid=>gw(ds,mid)):gaw(ds);
    const projs=projsOnDate(ds,filterIds);
    const isTod=ds===td?' tod':'';
    const showProjs=projs.slice(0,2),showWorks=ws.slice(0,Math.max(0,2-showProjs.length));
    const moreCount=(projs.length-showProjs.length)+Math.max(0,ws.length-showWorks.length);
    const projBars=showProjs.map(p=>`<div class="mdc-proj-bar" style="background:${p.color}20;color:${p.color};border-left:2px solid ${p.color}">${p.name}</div>`).join('');
    const workDots=showWorks.map(w=>{const cat=gc(w.catId);return`<div class="dd" style="background:${cat.hx};width:5px;height:5px;border-radius:50%"></div>`}).join('');
    cells+=`<div class="mdc${isTod}" onclick="gotoDate('${ds}')">
      <div class="mdc-num">${d}</div>${projBars}
      ${workDots?`<div class="mdc-work-dots">${workDots}</div>`:''}
      ${moreCount>0?`<div class="mdc-more">+${moreCount}</div>`:''}
    </div>`;
  }
  const remain=(7-(fd+days)%7)%7;
  for(let i=0;i<remain;i++) cells+=`<div class="mdc empty"></div>`;
  const ganttHTML=rGanttMonth(y,m,filterIds);
  let mWorks=[];const activeDays=new Set();
  for(let d=1;d<=days;d++){
    const ds=dk(y,m,d);
    const ws=filterIds?filterIds.flatMap(mid=>gw(ds,mid)):gaw(ds);
    mWorks.push(...ws);if(ws.length)activeDays.add(ds);
  }
  const activeProjs=projsInMonth(y,m,filterIds);
  const projLegend=activeProjs.map(p=>{
    const s=p.start>dk(y,m,1)?p.start:dk(y,m,1);
    const e=p.end<dk(y,m,days)?p.end:dk(y,m,days);
    return`<div class="pl-item"><div class="pl-dot" style="background:${p.color}"></div><span class="pl-name">${p.name}</span><span class="pl-dur">${s.slice(5)}~${e.slice(5)}</span></div>`;
  }).join('')||`<div style="font-size:11px;color:var(--text-3)">없음</div>`;
  el.innerHTML=`<div class="annual-wrap">
    <div class="annual-header" style="margin-bottom:14px">
      <div class="monthly-header">
        <button class="mo-nav" onclick="shiftMonth(-1)">← 이전</button>
        <span class="mo-title">${y}년 ${MONTHS[m]}</span>
        <button class="mo-nav" onclick="shiftMonth(1)">다음 →</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">${memberFilterHTML()}${toggleHTML}</div>
    </div>
    ${buildAiPanel()}
    <div class="month-cal-wrap">
      <div>
        <div class="month-cal">
          <div class="mcal-head">${DAYS.map(l=>`<div class="mcal-dl">${l}</div>`).join('')}</div>
          <div class="mcal-grid">${cells}</div>
        </div>
        <div style="margin-top:14px">
          <div style="font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:8px">팀원별 프로젝트 일정</div>
          ${ganttHTML}
        </div>
      </div>
      <div class="mo-detail">
        <div class="mo-det-title">${MONTHS[m]} 요약</div>
        <div class="mo-stat-grid">
          <div class="mo-stat"><div class="mo-stat-l">총 업무</div><div class="mo-stat-v">${mWorks.length}</div></div>
          <div class="mo-stat"><div class="mo-stat-l">활동일</div><div class="mo-stat-v">${activeDays.size}</div></div>
          <div class="mo-stat"><div class="mo-stat-l">프로젝트</div><div class="mo-stat-v">${activeProjs.length}</div></div>
        </div>
        <div class="mo-det-title" style="margin-bottom:8px">이달 프로젝트</div>
        <div>${projLegend}</div>
      </div>
    </div></div>`;
}

function rGanttMonth(y,m,filterIds){
  const days=dim(y,m),td=today();
  const mStart=dk(y,m,1),mEnd=dk(y,m,days);
  const members=filterIds?S.members.filter(mm=>filterIds.includes(mm.id)):S.members;
  const visMembers=members.filter(mm=>S.projects.some(p=>p.members.includes(mm.id)&&p.start<=mEnd&&p.end>=mStart));
  if(!visMembers.length) return`<div style="font-size:12px;color:var(--text-3);padding:8px 0">이달 진행 중인 프로젝트가 없습니다.</div>`;
  let dayLabels='';
  for(let d=1;d<=days;d++){
    const ds=dk(y,m,d);
    dayLabels+=`<div class="gantt-day-lbl${ds===td?' today-lbl':''}" style="flex:1">${d%5===1||d===1?d:''}</div>`;
  }
  let rows='';
  visMembers.forEach(mm=>{
    const mi=midx(mm.id),c=ac(mi);
    const memberProjs=S.projects.filter(p=>p.members.includes(mm.id)&&p.start<=mEnd&&p.end>=mStart);
    const bars=memberProjs.map((p,pi)=>{
      const ps=p.start<mStart?mStart:p.start,pe=p.end>mEnd?mEnd:p.end;
      const sd=parseInt(ps.slice(8))-1,ed=parseInt(pe.slice(8))-1;
      const left=(sd/days*100).toFixed(1),width=((ed-sd+1)/days*100).toFixed(1);
      return`<div class="gantt-bar" style="left:${left}%;width:${width}%;background:${p.color};top:${pi*20+2}px" title="${p.name}">${p.name}</div>`;
    }).join('');
    const trackH=Math.max(22,memberProjs.length*20+4);
    rows+=`<div class="gantt-row">
      <div class="gantt-member-name">
        ${avHTML(mm,18,8)}
        <span style="font-size:11px">${mm.name}</span>
      </div>
      <div class="gantt-track" style="height:${trackH}px">${bars}</div>
    </div>`;
  });
  return`<div class="gantt-wrap">
    <div class="gantt-header"><div class="gantt-name-col"></div><div style="display:flex;flex:1">${dayLabels}</div></div>
    ${rows}</div>`;
}

/* ── PROJECT TAB ── */
function toggleProjStatus(v){S.projFilter.status=v;rProject()}
function toggleProjMember(mid){S.projFilter.members.has(mid)?S.projFilter.members.delete(mid):S.projFilter.members.add(mid);rProject()}
function toggleProjCat(cid){S.projFilter.categories.has(cid)?S.projFilter.categories.delete(cid):S.projFilter.categories.add(cid);rProject()}
function clearProjFilter(){S.projFilter={status:'all',members:new Set(),categories:new Set()};rProject()}

function rProject(){
  const el=document.getElementById('vp');const td=today();
  const f=S.projFilter;

  // apply filters
  let projs=S.projects.filter(p=>{
    // status
    const isDone=p.end<td;
    if(f.status==='active'&&isDone) return false;
    if(f.status==='done'&&!isDone) return false;
    // members
    if(f.members.size>0&&![...f.members].some(mid=>p.members.includes(mid))) return false;
    // categories
    if(f.categories.size>0&&![...f.categories].some(cid=>(p.categories||[]).includes(cid))) return false;
    return true;
  });

  const active=projs.filter(p=>p.end>=td);
  const done=projs.filter(p=>p.end<td);

  // filter bar
  const statusPills=['all','active','done'].map((v,i)=>{
    const lbl=['전체','진행중','완료'][i];
    return`<button class="pf-pill${f.status===v?' on':''}" onclick="toggleProjStatus('${v}')">${lbl}</button>`;
  }).join('');

  const memberPills=S.members.map(m=>{
    const on=f.members.has(m.id)?' on':'';
    return`<div class="pf-pill-mem${on}" onclick="toggleProjMember('${m.id}')">
      ${avHTML(m,16,7)}${m.name}
    </div>`;
  }).join('');

  const catPills=S.categories.map(c=>{
    const on=f.categories.has(c.id)?' on':'';
    return`<div class="pf-pill-cat${on}" onclick="toggleProjCat('${c.id}')">
      <div class="cdot" style="background:${c.hx};width:7px;height:7px"></div>${c.l}
    </div>`;
  }).join('');

  const hasFilter=f.status!=='all'||f.members.size>0||f.categories.size>0;

  const filterBar=`<div class="proj-filterbar">
    <div class="proj-filter-row">
      <span class="pf-label">상태</span>${statusPills}
      ${hasFilter?`<button onclick="clearProjFilter()" style="margin-left:auto;font-size:11px;color:var(--text-3);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif">초기화 ✕</button>`:''}
    </div>
    <div class="proj-filter-row"><span class="pf-label">팀원</span>${memberPills}</div>
    <div class="proj-filter-row"><span class="pf-label">카테고리</span>${catPills}</div>
  </div>`;

  function projCard(p){
    const mavs=p.members.map(mid=>{const mm=S.members.find(m=>m.id===mid);if(!mm)return'';return`<div title="${mm.name}" style="margin-right:-6px">${avHTML(mm,24,9)}</div>`}).join('');
    const dLeft=Math.ceil((new Date(p.end+'T00:00:00')-new Date(td+'T00:00:00'))/(86400000));
    const isDone=dLeft<0;
    const dInfo=dLeft>0?`D-${dLeft}`:dLeft===0?'오늘 마감':`${Math.abs(dLeft)}일 전 완료`;
    const pct=Math.min(100,Math.max(0,Math.round((new Date(td+'T00:00:00')-new Date(p.start+'T00:00:00'))/(new Date(p.end+'T00:00:00')-new Date(p.start+'T00:00:00'))*100)));
    const cats=(p.categories||[]).map(cid=>{const c=gc(cid);return`<span style="font-size:10px;padding:2px 7px;border-radius:8px;background:${c.bg};color:${c.t};font-weight:500">${c.l}</span>`}).join('');
    // duration in days
    const totalDays=Math.ceil((new Date(p.end+'T00:00:00')-new Date(p.start+'T00:00:00'))/(86400000))+1;
    return`<div class="proj-card" onclick="showEditProj('${p.id}')" style="cursor:pointer;${isDone?'opacity:.75':''}">
      <div class="proj-card-top">
        <div style="width:3px;height:36px;border-radius:2px;background:${p.color};flex-shrink:0;margin-right:2px"></div>
        <div style="flex:1;min-width:0">
          <div class="proj-card-name">${p.name}</div>
          ${isDone?`<div style="font-size:10px;color:var(--text-3);margin-top:1px">완료됨</div>`:`<div style="font-size:10px;color:${p.color};margin-top:1px;font-weight:500">${dInfo}</div>`}
        </div>
        <div style="display:flex;align-items:center;gap:3px">
          <button class="del-proj" onclick="event.stopPropagation();confirmDelProj('${p.id}')" title="삭제">✕</button>
        </div>
      </div>
      ${cats?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin:8px 0 4px">${cats}</div>`:'<div style="margin-top:6px"></div>'}
      <div style="font-size:11px;color:var(--text-2);margin-bottom:8px;display:flex;align-items:center;gap:5px">
        <span>📅</span><span>${p.start} ~ ${p.end}</span><span style="color:var(--text-3)">·</span><span style="color:var(--text-3)">${totalDays}일</span>
      </div>
      <div style="height:3px;background:var(--bg-sub);border-radius:2px;margin-bottom:10px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${p.color};border-radius:2px;transition:width .3s"></div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;padding-left:6px">${mavs}</div>
        <span class="proj-cal-badge">📆 달력 연동</span>
      </div>
    </div>`;
  }

  let html=filterBar;

  if(active.length){
    html+=`<div class="proj-section">
      <div class="proj-sec-title">진행 중 <span style="font-size:11px;font-weight:400;color:var(--text-2)">${active.length}개</span>
        <button class="mbtn p" style="padding:5px 12px;font-size:11px" onclick="showAddProj()">+ 프로젝트 추가</button>
      </div>
      <div class="proj-grid">${active.map(projCard).join('')}</div>
    </div>`;
  } else {
    html+=`<div class="proj-section">
      <div class="proj-sec-title">진행 중 <span style="font-size:11px;font-weight:400;color:var(--text-2)">0개</span>
        <button class="mbtn p" style="padding:5px 12px;font-size:11px" onclick="showAddProj()">+ 프로젝트 추가</button>
      </div>
      <div style="font-size:12px;color:var(--text-3);padding:12px 0">${hasFilter?'필터 조건에 맞는 진행 중 프로젝트가 없습니다.':'진행 중인 프로젝트가 없습니다.'}</div>
    </div>`;
  }

  if(done.length){
    html+=`<div class="proj-section">
      <div class="proj-sec-title" style="color:var(--text-2)">
        <span>완료 <span style="font-size:11px;font-weight:400">${done.length}개</span></span>
        <button class="pf-pill${f.status==='done'?' on':''}" style="font-size:11px" onclick="toggleProjStatus(S.projFilter.status==='done'?'all':'done')">완료만 보기</button>
      </div>
      <div class="proj-grid">${done.map(projCard).join('')}</div>
    </div>`;
  }

  el.innerHTML=`<div class="proj-wrap">${html}</div>`;
}

function openDayPop(mid,ds,evt){
  evt.stopPropagation();
  closePop();
  const m=S.members.find(x=>x.id===mid);if(!m)return;
  const ws=gw(ds,mid);
  const d=new Date(ds+'T00:00:00');
  const dateLabel=`${ds.slice(5).replace('-','/')} ${['일','월','화','수','목','금','토'][d.getDay()]}`;
  const cOpts=S.categories.map(c=>`<option value="${c.id}">${c.l}</option>`).join('');
  const projs=projsOnDate(ds,[mid]);
  const projBadges=projs.map(p=>`<span style="font-size:10px;padding:1px 7px;border-radius:8px;background:${p.color}18;color:${p.color};border-left:2px solid ${p.color};font-weight:500;white-space:nowrap">${p.name}</span>`).join('');

  const items=ws.length
    ? ws.map((w,wi)=>{const cat=gc(w.catId);return`<div class="pop-item">
        <span class="cbadge" style="background:${cat.bg};color:${cat.t};font-size:9px">${cat.l}</span>
        <span class="pop-item-text">${w.text}</span>
        <button class="pop-del" onclick="delPopW('${ds}','${mid}',${wi})">✕</button>
      </div>`;}).join('')
    : `<div class="pop-empty">등록된 업무 없음</div>`;

  const pop=document.createElement('div');
  pop.id='day-pop';
  pop.innerHTML=`
    <div class="pop-header">
      ${avHTML(m,20,8)}
      <div style="flex:1;min-width:0"><div style="font-weight:500">${m.name}</div><div style="font-size:10px;color:var(--text-3)">${dateLabel}</div></div>
      <button class="pop-close" onclick="closePop()">✕</button>
    </div>
    ${projBadges?`<div style="padding:6px 12px 4px;display:flex;gap:4px;flex-wrap:wrap">${projBadges}</div>`:''}
    <div class="pop-items" id="pop-items">${items}</div>
    <div class="pop-add">
      <select id="pop-cat" class="pop-sel">${cOpts}</select>
      <input id="pop-inp" class="pop-inp" placeholder="업무 입력..." onkeydown="if(event.key==='Enter')addPopW('${ds}','${mid}')">
      <button class="pop-btn" onclick="addPopW('${ds}','${mid}')">+</button>
    </div>`;

  // position near click, keep in viewport
  const vw=window.innerWidth,vh=window.innerHeight;
  const rect=evt.currentTarget.getBoundingClientRect();
  let left=rect.left,top=rect.bottom+6;
  if(left+296>vw) left=Math.max(8,vw-300);
  if(top+280>vh) top=Math.max(8,rect.top-286);

let aiHistory=[];
let aiPanelOpen=true;

function buildAiContext(){
  const td=today();
  const projList=S.projects.map(p=>{
    const isDone=p.end<td;
    const dLeft=Math.ceil((new Date(p.end+'T00:00:00')-new Date(td+'T00:00:00'))/(86400000));
    const members=p.members.map(mid=>{const m=S.members.find(x=>x.id===mid);return m?m.name:'?'}).join(', ');
    const cats=(p.categories||[]).map(cid=>gc(cid).l).join(', ');
    const pct=Math.min(100,Math.max(0,Math.round((new Date(td+'T00:00:00')-new Date(p.start+'T00:00:00'))/(new Date(p.end+'T00:00:00')-new Date(p.start+'T00:00:00'))*100)));
    return `- ${p.name}: ${p.start}~${p.end} | 상태:${isDone?'완료':`진행중(D-${Math.max(0,dLeft)})`} | 진행율:${pct}% | 팀원:[${members}] | 카테고리:[${cats||'없음'}]`;
  }).join('\n');
  const memberList=S.members.map(m=>{
    const wCount=Object.keys(S.works).filter(k=>k.startsWith(m.id+'::')).reduce((s,k)=>s+S.works[k].length,0);
    const myProjs=S.projects.filter(p=>p.members.includes(m.id)&&p.end>=td).map(p=>p.name).join(', ');
    return `- ${m.name}: 등록업무 ${wCount}건 | 진행중프로젝트:[${myProjs||'없음'}]`;
  }).join('\n');
  const totalWorks=Object.values(S.works).reduce((s,a)=>s+a.length,0);
  const activeProjs=S.projects.filter(p=>p.end>=td);
  const endingSoon=activeProjs.filter(p=>{
    const d=Math.ceil((new Date(p.end+'T00:00:00')-new Date(td+'T00:00:00'))/(86400000));
    return d>=0&&d<=14;
  });
  return `오늘: ${td}
총 팀원 수: ${S.members.length}명
진행중 프로젝트: ${activeProjs.length}개 / 전체: ${S.projects.length}개
전체 등록 업무: ${totalWorks}건
2주 내 마감 프로젝트: ${endingSoon.map(p=>p.name).join(', ')||'없음'}

[프로젝트 목록]
${projList||'(없음)'}

[팀원 현황]
${memberList||'(없음)'}`;
}

async function aiSearch(question){
  const context=buildAiContext();
  const systemPrompt=`당신은 팀 업무 트래커의 AI 어시스턴트입니다.
아래 팀/프로젝트 데이터를 바탕으로 사용자의 질문에 한국어로 명확하고 간결하게 답변하세요.

=== 현재 데이터 ===
${context}

답변 규칙:
- 데이터에 기반한 정확한 사실만 말하세요
- 프로젝트 이름 언급 시 "**프로젝트명**" 형식으로 굵게 표시하세요
- 팀원 이름 언급 시 "**이름**" 형식으로 굵게 표시하세요
- 날짜는 MM/DD 형식으로 간결하게 표시하세요
- 최대 5문장 이내로 답변하세요
- 불필요한 인사말 없이 바로 핵심 답변을 주세요`;

  const response=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      system:systemPrompt,
      messages:[{role:'user',content:question}]
    })
  });
  if(!response.ok) throw new Error(`API ${response.status}`);
  const data=await response.json();
  return data.content.map(c=>c.text||'').join('');
}

function renderAiText(text){
  return text
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

async function sendAiQuery(q){
  const inp=document.getElementById('ai-inp');
  const resultEl=document.getElementById('ai-result');
  const btn=document.getElementById('ai-send-btn');
  const question=(q||inp?.value||'').trim();
  if(!question||!resultEl)return;
  if(inp) inp.value=question;
  btn&&(btn.disabled=true);
  resultEl.className='ai-result loading';
  resultEl.innerHTML=`<div class="ai-typing-dot"></div><div class="ai-typing-dot"></div><div class="ai-typing-dot"></div><span style="margin-left:4px">분석 중…</span>`;
  try{
    const ans=await aiSearch(question);
    resultEl.className='ai-result';
    resultEl.innerHTML=renderAiText(ans);
    aiHistory.unshift({q:question,a:ans,ts:Date.now()});
    if(aiHistory.length>5) aiHistory.pop();
    refreshAiHistory();
  }catch(e){
    resultEl.className='ai-result error';
    resultEl.innerHTML=`⚠️ 오류가 발생했습니다: ${e.message}`;
  }finally{
    btn&&(btn.disabled=false);
    if(inp){inp.value='';inp.focus();}
  }
}

function refreshAiHistory(){
  const el=document.getElementById('ai-history');
  if(!el||!aiHistory.length)return;
  el.innerHTML=`<div class="ai-history-title">최근 질문</div>`+
    aiHistory.map((h,i)=>`<div class="ai-history-item" onclick="replayAiHistory(${i})">
      <span style="font-size:10px;color:var(--text-3)">Q</span>
      <span class="ai-history-q">${h.q}</span>
      <span style="font-size:10px;color:var(--text-3)">${new Date(h.ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</span>
    </div>`).join('');
}

function replayAiHistory(i){
  const h=aiHistory[i];if(!h)return;
  const resultEl=document.getElementById('ai-result');
  const inp=document.getElementById('ai-inp');
  if(inp) inp.value=h.q;
  if(resultEl){resultEl.className='ai-result';resultEl.innerHTML=renderAiText(h.a);}
}

function toggleAiPanel(){
  aiPanelOpen=!aiPanelOpen;
  const body=document.getElementById('ai-panel-body');
  const btn=document.getElementById('ai-toggle-btn');
  if(body){body.style.display=aiPanelOpen?'block':'none';}
  if(btn){btn.textContent=aiPanelOpen?'접기 ▲':'펼치기 ▼';}
}

function buildAiPanel(){
  const chips=[
    '마감 임박 프로젝트 있어?',
    '각 팀원이 몇 개 프로젝트 맡고 있어?',
    '이번 달 진행 중인 프로젝트 요약해줘',
    '업무가 가장 많은 팀원은?',
    '다음 달 마감되는 프로젝트는?',
  ];
  const chipsHTML=chips.map(c=>`<div class="ai-chip" onclick="sendAiQuery('${c}')">${c}</div>`).join('');
  const bodyStyle=aiPanelOpen?'':'display:none';
  const btnLabel=aiPanelOpen?'접기 ▲':'펼치기 ▼';
  const historyHTML=aiHistory.length
    ? `<div class="ai-history" id="ai-history"><div class="ai-history-title">최근 질문</div>`+
      aiHistory.map((h,i)=>`<div class="ai-history-item" onclick="replayAiHistory(${i})">
        <span style="font-size:10px;color:var(--text-3)">Q</span>
        <span class="ai-history-q">${h.q}</span>
        <span style="font-size:10px;color:var(--text-3)">${new Date(h.ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</span>
      </div>`).join('')+'</div>'
    : `<div id="ai-history"></div>`;
  const resultContent=aiHistory.length
    ? renderAiText(aiHistory[0].a)
    : `<span style="color:var(--text-3);font-size:12px;font-style:italic">위 질문 예시를 클릭하거나 직접 입력해 프로젝트 현황을 물어보세요 ✦</span>`;
  return`<div class="ai-search-wrap" id="ai-panel">
    <div class="ai-search-header">
      <div class="ai-search-icon">✦</div>
      <div>
        <div class="ai-search-title">AI 프로젝트 검색</div>
        <div style="font-size:11px;color:var(--text-3);margin-top:1px">자연어로 프로젝트와 팀 현황을 검색하세요</div>
      </div>
      <button class="ai-search-toggle" id="ai-toggle-btn" onclick="toggleAiPanel()">${btnLabel}</button>
    </div>
    <div class="ai-search-body" id="ai-panel-body" style="${bodyStyle}">
      <div class="ai-input-row">
        <input class="ai-inp" id="ai-inp" placeholder="예: 마감 임박한 프로젝트 알려줘, 팀원별 프로젝트 현황은?" onkeydown="if(event.key==='Enter')sendAiQuery()">
        <button class="ai-send-btn" id="ai-send-btn" onclick="sendAiQuery()">
          <span style="font-size:14px">✦</span> 검색
        </button>
      </div>
      <div class="ai-chips">${chipsHTML}</div>
      <div class="ai-result" id="ai-result">${resultContent}</div>
      ${historyHTML}
    </div>
  </div>`;
}
</script>
</html>
