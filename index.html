<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 업무 트래커</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#378ADD;--c1bg:#E6F1FB;--c1t:#0C447C;
  --c2:#1D9E75;--c2bg:#E1F5EE;--c2t:#085041;
  --c3:#D4537E;--c3bg:#FBEAF0;--c3t:#72243E;
  --c4:#BA7517;--c4bg:#FAEEDA;--c4t:#633806;
  --c5:#888780;--c5bg:#F4F3EE;--c5t:#444441;
  --c6:#7F77DD;--c6bg:#EEEDFE;--c6t:#3C3489;
  --bg:#ffffff;
  --bg-sub:#f8f9fb;
  --bg-hover:#f3f4f6;
  --border:#e8eaed;
  --border-light:#f0f1f3;
  --text:#111827;
  --text-2:#6b7280;
  --text-3:#9ca3af;
  --accent:#4264FB;
  --accent-bg:#EEF2FF;
  --today-bg:#f0f5ff;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --radius:10px;--radius-sm:7px;--radius-xs:5px;
}
body{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}

.app{display:grid;grid-template-rows:56px 1fr;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--border);background:var(--bg);gap:16px}
.tb-brand{font-size:15px;font-weight:600;letter-spacing:-.3px;padding-right:16px;border-right:1px solid var(--border);white-space:nowrap}
.tb-tabs{display:flex;gap:1px;flex:1}
.tb-tab{padding:7px 14px;font-size:13px;font-weight:400;border:none;background:none;color:var(--text-2);cursor:pointer;border-radius:var(--radius-xs);transition:all .15s;font-family:'DM Sans',sans-serif}
.tb-tab:hover{background:var(--bg-hover);color:var(--text)}
.tb-tab.on{background:var(--bg-hover);color:var(--text);font-weight:500}
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.yr-nav{display:flex;align-items:center;gap:6px}
.yr-btn{border:1px solid var(--border);background:none;border-radius:var(--radius-xs);padding:4px 9px;cursor:pointer;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;transition:background .12s}
.yr-btn:hover{background:var(--bg-hover)}
.yr-val{font-weight:500;font-size:13px;min-width:38px;text-align:center}

.body{display:grid;grid-template-columns:172px 1fr;overflow:hidden}
.side{border-right:1px solid var(--border);padding:16px 10px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;background:#F4F5F7}
.s-label{font-size:10px;letter-spacing:.07em;color:var(--text-3);text-transform:uppercase;padding:0 6px;margin-bottom:6px;font-weight:600}
.m-btn{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius-sm);border:none;background:none;width:100%;cursor:pointer;text-align:left;transition:background .12s;font-family:'DM Sans',sans-serif}
.m-btn:hover{background:rgba(0,0,0,.06)}
.m-btn.sel{background:rgba(0,0,0,.08)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
.m-name{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.m-cnt{font-size:10px;color:var(--text-3);background:var(--bg-sub);border-radius:9px;padding:1px 6px}
.add-m{width:100%;padding:6px;border:1px dashed var(--border);border-radius:var(--radius-sm);background:none;color:var(--text-3);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.add-m:hover{border-color:var(--text-3);color:var(--text-2);background:rgba(0,0,0,.04)}
.cat-item{display:flex;align-items:center;gap:6px;padding:3px 6px;font-size:11px;color:var(--text-2)}
.cat-item:hover .cat-edit-btn{opacity:1!important}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.panel{overflow-y:auto;height:calc(100vh - 56px)}
.v-annual,.v-daily,.v-team,.v-project,.v-gantt{display:none}
.v-annual.on,.v-daily.on,.v-team.on,.v-project.on,.v-gantt.on{display:block}
.v-team.on{display:flex;flex-direction:column;height:calc(100vh - 56px);overflow:hidden}

/* toggle */
.view-toggle{display:flex;gap:2px;background:var(--bg-sub);border-radius:var(--radius-sm);padding:3px;border:1px solid var(--border)}
.vt-btn{padding:4px 12px;font-size:12px;border:none;background:none;border-radius:var(--radius-xs);cursor:pointer;color:var(--text-2);font-family:'DM Sans',sans-serif;transition:all .12s}
.vt-btn.on{background:var(--bg);color:var(--text);font-weight:500;box-shadow:var(--shadow)}

/* annual */
.annual-wrap{padding:20px 24px}
.annual-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.annual-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mb{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.mb:hover{border-color:var(--accent);box-shadow:var(--shadow)}
.mb-title{font-size:11px;font-weight:500;color:var(--text-2);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.mb-cnt{font-size:10px;color:var(--text-3);font-weight:400;background:var(--bg-sub);padding:1px 6px;border-radius:8px}
.dg{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.dl{font-size:8px;color:var(--text-3);text-align:center;padding-bottom:3px}
.dc{position:relative;display:flex;flex-direction:column;align-items:stretch;font-size:8px;color:var(--text-3);border-radius:3px;cursor:pointer;overflow:hidden;padding:3px 2px 2px;min-height:28px}
.dc:hover{outline:1px solid var(--accent);background:var(--bg-hover)}
.dc.tod{outline:2px solid var(--accent)!important;font-weight:700;z-index:2}
.dc.tod .dc-num{color:var(--accent)}
.dc.hw .dc-num{font-weight:600;color:var(--text)}
.dc-num{position:relative;z-index:2;pointer-events:none;line-height:1;text-align:center;font-size:8px;margin-bottom:2px}
.dc-bg{display:none}
.dc .dr{display:none}
.dd{width:2px;height:2px;border-radius:50%}
.dc-proj-dots{display:flex;flex-direction:column;gap:2px;width:100%;z-index:2}
.dc-proj-item{display:flex;align-items:center;gap:2px;width:100%;overflow:hidden}
.dc-proj-dot{width:3px;height:3px;border-radius:50%;flex-shrink:0}
.dc-proj-name{font-size:6px;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;line-height:1.2;font-weight:500}

/* member filter */
.member-filter{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.mf-pill{display:flex;align-items:center;gap:4px;padding:4px 10px 4px 6px;border-radius:20px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:11px;color:var(--text-2);white-space:nowrap;transition:all .12s}
.mf-pill:hover{border-color:var(--text-2);color:var(--text)}
.mf-pill.on{border-color:var(--accent);color:var(--accent);font-weight:500;background:var(--accent-bg)}
.mf-av{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:600;flex-shrink:0}

/* member annual section */
.member-annual-section{margin-bottom:22px}
.mas-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.mas-name{font-size:13px;font-weight:500}
.mas-proj-pills{display:flex;gap:4px;flex-wrap:wrap}
.mas-pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.mas-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.mas-mb{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px;cursor:pointer;transition:border-color .12s}
.mas-mb:hover{border-color:var(--accent)}
.mas-mb-title{font-size:10px;font-weight:500;color:var(--text-2);margin-bottom:5px}
.mas-dg{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.mas-dc{position:relative;border-radius:2px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;align-items:stretch;padding:3px 2px 2px;min-height:24px}
.mas-dc:hover{outline:1px solid var(--accent);background:var(--bg-hover)}
.mas-dc.tod{outline:2px solid var(--accent)!important}
.mas-dc.tod .mas-dc-num{color:var(--accent);font-weight:700}
.mas-dc-bg{display:none}
.mas-dc-num{position:relative;z-index:2;font-size:7px;color:var(--text-3);text-align:center;line-height:1;margin-bottom:2px}
.mas-dc.hw .mas-dc-num{color:var(--text);font-weight:600}
.mas-dc-proj-dots{display:flex;flex-direction:column;gap:2px;width:100%;z-index:2}
.mas-dc-proj-item{display:flex;align-items:center;gap:2px;width:100%;overflow:hidden}
.mas-dc-proj-dot{width:3px;height:3px;border-radius:50%;flex-shrink:0}
.mas-dc-proj-name{font-size:6px;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;line-height:1.2;font-weight:500}

/* proj legend */
.proj-legend-inline{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pli{display:flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:var(--radius-xs);background:var(--bg-sub);border:1px solid var(--border)}
.pli-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* monthly */
.monthly-header{display:flex;align-items:center;gap:8px}
.mo-nav{border:1px solid var(--border);background:none;border-radius:var(--radius-sm);padding:5px 11px;font-size:12px;cursor:pointer;color:var(--text);font-family:'DM Sans',sans-serif;transition:background .12s}
.mo-nav:hover{background:var(--bg-hover)}
.mo-title{font-size:15px;font-weight:500}
.gantt-wrap{margin-top:6px}
.gantt-header{display:flex;align-items:center;margin-bottom:4px}
.gantt-name-col{width:88px;flex-shrink:0;font-size:11px;font-weight:500;color:var(--text-2)}
.gantt-day-lbl{flex:1;text-align:center;font-size:8px;color:var(--text-3)}
.gantt-day-lbl.today-lbl{color:var(--accent);font-weight:700}
.gantt-row{display:flex;align-items:flex-start;margin-bottom:3px}
.gantt-member-name{width:88px;flex-shrink:0;font-size:11px;display:flex;align-items:center;gap:5px;overflow:hidden;padding-top:3px}
.gantt-track{flex:1;position:relative;border-radius:4px;overflow:hidden}
.gantt-bar{position:absolute;top:2px;height:14px;border-radius:3px;display:flex;align-items:center;padding:0 6px;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;color:#fff;font-weight:500}
.gantt-bar:hover{opacity:.85}
.month-cal-wrap{display:grid;grid-template-columns:1fr 200px;gap:14px;align-items:start}
.month-cal{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.mcal-head{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)}
.mcal-dl{padding:6px 0;font-size:10px;color:var(--text-2);text-align:center;font-weight:500}
.mcal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.mdc{min-height:80px;border-right:1px solid var(--border-light);border-bottom:1px solid var(--border-light);padding:4px;cursor:pointer;position:relative;transition:background .12s;display:flex;flex-direction:column}
.mdc:hover{background:var(--bg-sub)}
.mdc:nth-child(7n){border-right:none}
.mdc.empty{background:var(--bg-sub);cursor:default}
.mdc.tod{background:var(--today-bg)}
.mdc-num{font-size:10px;font-weight:500;color:var(--text-2);margin-bottom:2px}
.mdc.tod .mdc-num{color:var(--accent);font-weight:700}
.mdc-proj-bar{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4;font-weight:500}
.mdc-work-dots{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap}
.mdc-more{font-size:9px;color:var(--text-3);font-weight:500}
.mo-detail{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.mo-det-title{font-size:12px;font-weight:500;margin-bottom:8px;color:var(--text-2)}
.mo-stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.mo-stat{background:var(--bg-sub);border-radius:var(--radius-sm);padding:8px 9px}
.mo-stat-l{font-size:10px;color:var(--text-2);margin-bottom:2px}
.mo-stat-v{font-size:17px;font-weight:600}
.pl-item{display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:6px}
.pl-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.pl-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.pl-dur{font-size:10px;color:var(--text-3);white-space:nowrap}

/* project tab */
.proj-wrap{padding:20px 24px}
.proj-filterbar{display:flex;flex-direction:column;gap:8px;padding:12px 14px;background:var(--bg-sub);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px}
.proj-filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pf-label{font-size:10px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;min-width:40px;flex-shrink:0}
.pf-pill{padding:3px 10px;border-radius:14px;border:1px solid var(--border);background:var(--bg);font-size:11px;color:var(--text-2);cursor:pointer;transition:all .12s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.pf-pill:hover{border-color:var(--text-2);color:var(--text)}
.pf-pill.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);font-weight:500}
.pf-pill-mem{display:flex;align-items:center;gap:4px;padding:2px 8px 2px 3px;border-radius:14px;border:1px solid var(--border);background:var(--bg);font-size:11px;color:var(--text-2);cursor:pointer;transition:all .12s}
.pf-pill-mem:hover{border-color:var(--text-2);color:var(--text)}
.pf-pill-mem.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);font-weight:500}
.pf-pill-cat{display:flex;align-items:center;gap:5px;padding:3px 10px 3px 7px;border-radius:14px;border:1px solid var(--border);background:var(--bg);font-size:11px;color:var(--text-2);cursor:pointer;transition:all .12s}
.pf-pill-cat:hover{border-color:var(--text-2);color:var(--text)}
.pf-pill-cat.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);font-weight:500}
.proj-cal-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--text-3);padding:2px 6px;border-radius:4px;background:var(--bg-sub)}
.proj-section{margin-bottom:22px}
.proj-sec-title{font-size:13px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.proj-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:13px;transition:box-shadow .15s}
.proj-card:hover{box-shadow:var(--shadow-md)}
.proj-card-color{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.proj-card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.proj-card-name{font-size:13px;font-weight:500;flex:1}
.proj-card-dates{font-size:11px;color:var(--text-2);margin-bottom:8px}
.proj-members{display:flex;gap:3px;flex-wrap:wrap}
.proj-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600}
.del-proj{background:none;border:none;cursor:pointer;font-size:11px;color:var(--text-3);padding:2px 5px;border-radius:4px;transition:all .12s}
.del-proj:hover{background:var(--bg-sub);color:var(--text-2)}

/* daily */
.daily-wrap{max-width:600px;padding:20px 24px}
.dh{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.d-nav{border:1px solid var(--border);background:none;border-radius:var(--radius-sm);padding:5px 10px;font-size:12px;cursor:pointer;color:var(--text);font-family:'DM Sans',sans-serif;transition:background .12s}
.d-nav:hover{background:var(--bg-hover)}
.d-title{font-size:16px;font-weight:600}
.d-sub{font-size:11px;color:var(--text-2)}
.inp-box{background:var(--bg-sub);border-radius:var(--radius);padding:12px;margin-bottom:14px;border:1px solid var(--border)}
.inp-row{display:flex;gap:6px;margin-bottom:6px}
.inp-row:last-child{margin-bottom:0}
.sel{border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 8px;font-size:12px;background:var(--bg);color:var(--text);height:32px;font-family:'DM Sans',sans-serif}
.wta{flex:1;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;font-size:12px;background:var(--bg);color:var(--text);height:32px;resize:none;font-family:'DM Sans',sans-serif;transition:border-color .12s}
.wta:focus{outline:none;border-color:var(--accent)}
.ab{padding:5px 14px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;height:32px;white-space:nowrap;font-family:'DM Sans',sans-serif;font-weight:500;transition:opacity .12s}
.ab:hover{opacity:.82}
.wi{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px;transition:box-shadow .12s}
.wi:hover{box-shadow:var(--shadow)}
.cbadge{font-size:10px;padding:2px 7px;border-radius:9px;flex-shrink:0;margin-top:1px;font-weight:500}
.wi-text{font-size:12px;flex:1;line-height:1.5}
.xbtn{background:none;border:none;cursor:pointer;font-size:11px;color:var(--text-3);padding:2px 4px;border-radius:4px;margin-left:auto;transition:all .12s}
.xbtn:hover{background:var(--bg-sub);color:var(--text-2)}
.empty{text-align:center;padding:28px;color:var(--text-2);font-size:12px;line-height:1.9}

/* ── TEAM VIEW (Vocale-style) ── */
.team-cal-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.tcal-nav-group{display:flex;align-items:center;gap:8px}
.tcal-nav-btn{border:1px solid var(--border);background:none;border-radius:var(--radius-sm);width:28px;height:28px;cursor:pointer;font-size:15px;color:var(--text-2);display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;transition:all .12s}
.tcal-nav-btn:hover{background:var(--bg-hover);color:var(--text)}
.tcal-range{font-size:14px;font-weight:500}
.tcal-today{padding:5px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:none;font-size:12px;cursor:pointer;color:var(--text-2);font-family:'DM Sans',sans-serif;transition:all .12s}
.tcal-today:hover{background:var(--bg-hover);color:var(--text)}
.tcal-stats{display:flex;align-items:center;gap:16px}
.tcal-stat{font-size:12px;color:var(--text-2)}
.tcal-stat b{color:var(--text);font-weight:600}
.team-cal-body{flex:1;overflow:auto}
.team-cal-table{width:100%;border-collapse:collapse;table-layout:fixed}

/* sticky header row */
.team-head-th{padding:14px 10px 12px;text-align:center;border-bottom:1px solid var(--border);border-left:1px solid var(--border-light);background:var(--bg);position:sticky;top:0;z-index:10}
.team-head-corner{position:sticky;top:0;left:0;z-index:15;background:var(--bg);border-bottom:1px solid var(--border);width:60px}
.mch-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;margin:0 auto 6px}
.mch-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap}

/* day rows */
.day-label-td{width:60px;padding:12px 10px 12px 14px;vertical-align:top;border-right:1px solid var(--border);border-bottom:1px solid var(--border-light);background:var(--bg);position:sticky;left:0;z-index:5;text-align:right}
.day-num{font-size:22px;font-weight:300;color:var(--text);line-height:1}
.day-kr{font-size:10px;font-weight:500;color:var(--text-3);text-transform:uppercase;margin-top:2px}
.day-label-td.is-today .day-num{color:var(--accent);font-weight:600}
.day-label-td.is-today .day-kr{color:var(--accent)}
.team-cell{padding:6px 7px;vertical-align:top;border-left:1px solid var(--border-light);border-bottom:1px solid var(--border-light);min-height:80px;transition:background .1s;cursor:pointer}
.team-cell:hover{background:var(--bg-sub)}
.team-cell.is-today{background:var(--today-bg)}
.team-cell.is-today:hover{background:#e8eeff}
.tv-add-hint{font-size:10px;color:var(--text-3);padding:4px 0;text-align:center;opacity:0;transition:opacity .12s}
.team-cell:hover .tv-add-hint{opacity:1}

/* task cards */
.tv-proj-card{font-size:11px;padding:4px 8px;border-radius:var(--radius-xs);margin-bottom:3px;font-weight:500;line-height:1.4;transition:opacity .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tv-proj-card:hover{opacity:.8}
.tv-work-card{font-size:11px;padding:5px 8px;border-radius:var(--radius-xs);margin-bottom:3px;line-height:1.35}
.tv-work-card:hover{opacity:.85}
.tv-card-cat{font-size:9px;font-weight:600;display:block;opacity:.7;margin-bottom:1px;text-transform:uppercase;letter-spacing:.04em}
.tv-card-text{display:block;font-size:11px;line-height:1.3;word-break:keep-all}

/* avatar with photo */
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}

/* profile modal */
.prof-av-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:20px}
.prof-av-btn{position:relative;cursor:pointer;border-radius:50%;flex-shrink:0}
.prof-av-btn:hover .prof-av-overlay{opacity:1}
.prof-av-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.38);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;font-size:10px;color:#fff;font-weight:500;text-align:center;line-height:1.3}
.prof-file-input{display:none}
.prof-name-big{font-size:15px;font-weight:600;color:var(--text)}
.prof-actions{display:flex;gap:6px;align-items:center}
.prof-remove{background:none;border:none;cursor:pointer;font-size:11px;color:var(--text-3);padding:3px 8px;border-radius:var(--radius-xs);font-family:'DM Sans',sans-serif;transition:all .12s}
.prof-remove:hover{background:#FEE2E2;color:#DC2626}
.mbtn.danger{border-color:#FCA5A5;color:#DC2626}
.mbtn.danger:hover{background:#FEE2E2}

/* modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px)}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:22px;width:350px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-md)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-field label{font-size:11px;color:var(--text-2);display:block;margin-bottom:5px;font-weight:500}
.modal-field input,.modal-field select{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;transition:border-color .12s}
.modal-field input:focus,.modal-field select:focus{outline:none;border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.mbtn{padding:6px 14px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:500;transition:all .12s}
.mbtn:hover{background:var(--bg-hover)}
.mbtn.p{background:var(--text);color:var(--bg);border-color:transparent}
.mbtn.p:hover{opacity:.85}
.color-picker{display:flex;gap:7px;flex-wrap:wrap}
.cp-swatch{width:22px;height:22px;border-radius:5px;cursor:pointer;border:2.5px solid transparent;transition:transform .12s}
.cp-custom{width:22px;height:22px;border-radius:5px;cursor:pointer;border:2px solid var(--border);padding:0;overflow:hidden;flex-shrink:0}
.cp-custom::-webkit-color-swatch-wrapper{padding:0}
.cp-custom::-webkit-color-swatch{border:none;border-radius:3px}
.cp-swatch:hover{transform:scale(1.1)}
.cp-swatch.on{border-color:var(--text);transform:scale(1.1)}
.member-check-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;max-height:150px;overflow-y:auto}
.mc-row{display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:var(--radius-xs);cursor:pointer;transition:background .12s}
.mc-row:hover{background:var(--bg-sub)}
.mc-row input{cursor:pointer;accent-color:var(--accent)}
/* ── DAY POPOVER ── */
#day-pop{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-md);width:290px;overflow:hidden;animation:popIn .12s ease}
@keyframes popIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.pop-header{display:flex;align-items:center;gap:7px;padding:10px 12px;border-bottom:1px solid var(--border);font-size:12px;font-weight:500}
.pop-close{margin-left:auto;background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-3);line-height:1;padding:0 2px}
.pop-close:hover{color:var(--text)}
.pop-items{padding:8px 10px;max-height:180px;overflow-y:auto}
.pop-item{display:flex;align-items:flex-start;gap:6px;padding:4px 6px;border-radius:var(--radius-xs);margin-bottom:2px;font-size:12px;transition:background .1s}
.pop-item:hover{background:var(--bg-sub)}
.pop-item-text{flex:1;line-height:1.45;font-size:11px;color:var(--text)}
.pop-del{background:none;border:none;cursor:pointer;font-size:10px;color:var(--text-3);padding:1px 3px;border-radius:3px;flex-shrink:0;margin-top:1px}
.pop-del:hover{background:var(--bg-hover);color:var(--text-2)}
.pop-empty{font-size:11px;color:var(--text-3);padding:4px 6px;font-style:italic}
.pop-add{display:flex;gap:5px;padding:8px 10px;border-top:1px solid var(--border);background:var(--bg-sub)}
.pop-sel{border:1px solid var(--border);border-radius:var(--radius-xs);padding:4px 6px;font-size:11px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;flex-shrink:0;max-width:90px}
.pop-inp{flex:1;border:1px solid var(--border);border-radius:var(--radius-xs);padding:5px 8px;font-size:11px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-width:0}
.pop-inp:focus{outline:none;border-color:var(--accent)}
.pop-btn{background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-xs);padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}
.pop-btn:hover{opacity:.85}

/* annual view work bar */
.day-cat-bar{position:absolute;bottom:0;left:0;right:0;height:3px;display:flex;z-index:3;border-radius:0 0 2px 2px;overflow:hidden}
.day-cat-seg{flex:1;height:100%}

/* event dot on annual day cell */
.day-evt-dot{position:absolute;top:1px;right:1px;width:4px;height:4px;border-radius:50%;z-index:4}
.day-evt-multi{position:absolute;top:1px;right:1px;width:5px;height:5px;border-radius:50%;background:var(--accent);z-index:4;font-size:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}

/* upcoming events list */
.evt-list{margin-top:20px}
.evt-list-title{font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.evt-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px;transition:box-shadow .12s}
.evt-item:hover{box-shadow:var(--shadow)}
.evt-dot-lg{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:2px}
.evt-date{font-size:11px;color:var(--text-3);white-space:nowrap;min-width:58px}
.evt-title{font-size:12px;font-weight:500;flex:1}
.evt-del{background:none;border:none;cursor:pointer;font-size:11px;color:var(--text-3);padding:1px 4px;border-radius:3px;transition:all .12s;margin-left:auto}
.evt-del:hover{background:var(--bg-sub);color:var(--text-2)}
.evt-empty{font-size:12px;color:var(--text-3);padding:12px 0;text-align:center}

.v-gantt{display:none;flex-direction:column;height:100%;overflow:hidden}
.v-gantt.on{display:flex}
.gantt-toolbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border-light);flex-shrink:0;background:var(--bg)}
.gantt-toolbar-title{font-size:13px;font-weight:600;color:var(--text);min-width:80px}
.gantt-wrap{display:flex;flex:1;overflow:hidden;border-top:2px solid var(--border-light);margin-top:4px}
.gantt-members{width:180px;flex-shrink:0;border-right:1px solid var(--border-light);overflow-y:auto;background:var(--bg)}
.gantt-member-header{height:48px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;padding:0 12px;font-size:11px;font-weight:600;color:var(--text-2);background:var(--bg-hover)}
.gantt-member-row{border-bottom:1px solid var(--border-light);display:flex;align-items:center;padding:0 12px;gap:8px;font-size:13px;color:var(--text);cursor:pointer}
.gantt-member-row:first-child{border-top:2px solid var(--border-light)}
.gantt-member-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.gantt-member-avatar img{width:100%;height:100%;object-fit:cover}
.gantt-member-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-chart{flex:1;overflow:auto;position:relative}
.gantt-header{display:flex;height:48px;border-bottom:1px solid var(--border-light);position:sticky;top:0;z-index:10;background:var(--bg);min-width:max-content}
.gantt-day-col{flex-shrink:0;border-right:1px solid var(--border-light);display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg-hover);height:44px;overflow:hidden}
.gantt-day-col.today{background:#EFF6FF}
.gantt-day-name{font-size:9px;color:var(--text-2);font-weight:500;white-space:nowrap}
.gantt-day-num{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap}
.gantt-day-col.today .gantt-day-num{color:#2563EB}
.gantt-rows{min-width:max-content}
.gantt-row{display:flex;position:relative;border-bottom:1px solid var(--border-light);overflow:hidden}
.gantt-rows>.gantt-row:first-child{margin-top:0}
.gantt-cell{flex-shrink:0;border-right:1px solid var(--border-light);height:100%}
.gantt-cell.today{background:#EFF6FF20}
.gantt-cell.weekend{background:var(--bg-hover)}
.gantt-bar{position:absolute;top:50%;transform:translateY(-50%);height:28px;border-radius:6px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;z-index:2;transition:opacity .15s;max-width:calc(100% - 4px)}
.gantt-bar:hover{opacity:.85;filter:brightness(1.05)}
.gantt-range-btn{padding:5px 10px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);cursor:pointer;transition:all .12s}
.gantt-range-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.gantt-nav-btn{width:28px;height:28px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}



/* ── GANTT2 PROJECT-BASED LAYOUT ── */
.gantt2-wrap{flex:1;overflow:auto;display:flex;flex-direction:column}
.gantt2-table{width:100%;border-collapse:collapse;min-width:max-content}
.gantt2-label-th{width:220px;min-width:220px;padding:10px 16px;font-size:11px;font-weight:600;color:var(--text-2);background:var(--bg-hover);border-bottom:2px solid var(--border-light);position:sticky;left:0;z-index:5;text-align:left}
.gantt2-dates-th{padding:0;background:var(--bg-hover);border-bottom:2px solid var(--border-light);overflow-x:auto;white-space:nowrap}
.gantt2-cat-row td{background:var(--bg);border-bottom:1px solid var(--border-light)}
.gantt2-row{cursor:pointer;transition:background .1s}
.gantt2-row:hover .gantt2-label-cell{background:var(--bg-hover)}
.gantt2-row:hover .gantt2-bar-cell{background:#F8FAFF}
.gantt2-label-cell{width:220px;min-width:220px;padding:8px 16px;border-bottom:1px solid var(--border-light);border-right:1px solid var(--border-light);background:var(--bg);position:sticky;left:0;z-index:2;vertical-align:middle}
.gantt2-proj-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.gantt2-proj-dates{font-size:11px;color:var(--text-3);margin-top:2px}
.gantt2-bar-cell{padding:0;border-bottom:1px solid var(--border-light);vertical-align:middle;height:48px}
.gantt-bar2{position:absolute;top:50%;transform:translateY(-50%);height:28px;border-radius:14px;display:flex;align-items:center;padding:0 10px;cursor:pointer;z-index:2;transition:opacity .15s;gap:6px;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.gantt-bar2:hover{opacity:.88;filter:brightness(1.05)}
/* ── GOOGLE CALENDAR STYLE MONTHLY VIEW ── */
.gcal-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.gcal-toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border-light);flex-shrink:0;gap:12px;flex-wrap:wrap}
.gcal-nav-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:50%;background:var(--bg);color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .12s}
.gcal-nav-btn:hover{background:var(--bg-hover)}
.gcal-today-btn{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:var(--bg);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:background .12s}
.gcal-today-btn:hover{background:var(--bg-hover)}
.gcal-month-label{font-size:18px;font-weight:600;color:var(--text)}
.gcal-body{display:flex;flex-direction:column;flex:1;overflow:hidden}
.gcal-dow-header{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border-light);flex-shrink:0}
.gcal-dow{padding:8px 0;text-align:center;font-size:11px;font-weight:600;color:var(--text-2);text-transform:uppercase}
.gcal-dow.sun{color:#EF4444}
.gcal-dow.sat{color:#3B82F6}
.gcal-grid{display:grid;grid-template-columns:repeat(7,1fr);flex:1;overflow-y:auto}
.gcal-cell{border-right:1px solid var(--border-light);border-bottom:1px solid var(--border-light);padding:4px;min-height:110px;cursor:pointer;transition:background .1s;display:flex;flex-direction:column;gap:2px}
.gcal-cell:hover{background:var(--bg-hover)}
.gcal-cell.today{background:#EFF6FF}
.gcal-cell.weekend{background:#FAFAFA}
.gcal-cell.holiday{background:#FFF5F5}
.gcal-cell.other-month{background:#F9F9F9}
.gcal-date-row{display:flex;align-items:center;gap:4px;margin-bottom:2px}
.gcal-date-num{font-size:13px;font-weight:500;color:var(--text);min-width:26px;text-align:center;line-height:26px}
.gcal-holi-label{font-size:9px;color:#EF4444;font-weight:500}
.gcal-date.other{font-size:12px;color:var(--text-3);padding:4px}
.gcal-event-bar{display:flex;align-items:center;padding:2px 6px;border-radius:3px;font-size:11px;font-weight:500;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;transition:opacity .12s;line-height:18px}
.gcal-event-bar:hover{opacity:.85;filter:brightness(.95)}
.gcal-event-bar span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gcal-work-item{display:flex;align-items:center;gap:4px;padding:1px 4px;border-radius:3px;font-size:11px;color:var(--text);overflow:hidden;white-space:nowrap;cursor:pointer;transition:background .1s}
.gcal-work-item:hover{background:var(--border-light)}
.gcal-work-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.gcal-work-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gcal-more{font-size:10px;color:var(--accent);cursor:pointer;padding:1px 4px;font-weight:500}
.gcal-more:hover{text-decoration:underline}

/* ── GANTT SPREADSHEET STYLE (연간보기) ── */
.gsi-label-panel{width:280px;flex-shrink:0;border-right:2px solid var(--border-light);display:flex;flex-direction:column;overflow:hidden}
.gsi-label-header{display:flex;height:48px;border-bottom:2px solid var(--border-light);background:var(--bg-hover);flex-shrink:0}
.gsi-label-body{flex:1;overflow-y:auto;overflow-x:hidden}
.gsi-label-row{display:flex;align-items:center;border-bottom:1px solid var(--border-light);background:var(--bg);transition:background .1s}
.gsi-label-row:hover{background:var(--bg-hover)}
.gsi-col-member{width:90px;min-width:90px;padding:4px 8px;display:flex;align-items:center;gap:5px;border-right:1px solid var(--border-light);font-size:12px;font-weight:600;color:var(--text);overflow:hidden}
.gsi-col-proj{flex:1;padding:4px 8px;font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;border-right:1px solid var(--border-light)}
.gsi-col-proj:hover{color:var(--accent)}
.gsi-col-status{width:70px;min-width:70px;padding:4px 6px;display:flex;align-items:center;justify-content:center}
.gsi-label-header .gsi-col-member{font-size:11px;font-weight:600;color:var(--text-2)}
.gsi-label-header .gsi-col-proj{font-size:11px;font-weight:600;color:var(--text-2)}
.gsi-label-header .gsi-col-status{font-size:11px;font-weight:600;color:var(--text-2);text-align:center}

/* ── DAY POP MEMO ── */
.pop-tabs{display:flex;border-bottom:1px solid var(--border-light);padding:0 12px}
.pop-tab{padding:6px 10px;font-size:11px;font-weight:500;color:var(--text-2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.pop-tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.pop-memo-area{padding:8px 12px}
.pop-memo-input{width:100%;min-height:80px;border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:8px;font-size:12px;color:var(--text);background:var(--bg-hover);font-family:'DM Sans',sans-serif;resize:vertical;outline:none;line-height:1.5;box-sizing:border-box}
.pop-memo-input:focus{border-color:var(--accent);background:var(--bg)}
.pop-memo-save{margin-top:6px;width:100%;padding:6px;font-size:12px;font-weight:500;border:none;border-radius:var(--radius-sm);background:var(--accent);color:#fff;cursor:pointer}
/* ── PROJECT DETAIL PAGE ── */
.proj-detail-overlay{position:fixed;inset:0;z-index:200;display:flex;justify-content:flex-end;background:rgba(0,0,0,.3);animation:fadeIn .15s}
.proj-detail-panel{width:min(780px,95vw);height:100vh;background:var(--bg);overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.12);display:flex;flex-direction:column;animation:slideInRight .2s}
@keyframes slideInRight{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
.pd-cover{height:120px;display:flex;align-items:flex-end;padding:16px 24px;position:relative;flex-shrink:0}
.pd-cover-emoji{font-size:40px;line-height:1;margin-bottom:-20px;position:relative;z-index:1}
.pd-body{padding:24px;flex:1}
.pd-title{font-size:28px;font-weight:700;color:var(--text);margin:16px 0 20px;outline:none;border:none;background:none;width:100%;font-family:'DM Sans',sans-serif;cursor:text}
.pd-title:focus{border-bottom:2px solid var(--accent)}
.pd-props{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border-light)}
.pd-prop-row{display:flex;align-items:center;gap:12px}
.pd-prop-label{font-size:12px;color:var(--text-2);width:80px;flex-shrink:0;font-weight:500}
.pd-prop-val{font-size:13px;color:var(--text)}
.pd-status-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.pd-section-title{font-size:13px;font-weight:600;color:var(--text-2);margin:20px 0 10px;text-transform:uppercase;letter-spacing:.5px}
.pd-tasks{display:flex;flex-direction:column;gap:4px;margin-bottom:16px}

async function sbGet(key){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/kv_store?key=eq.${key}&select=value`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    const d=await r.json();
    return d&&d.length?JSON.parse(d[0].value):null;

async function sbSet(key,value){

    });

function dk(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function today(){return new Date().toISOString().slice(0,10)}
function gw(ds,mid){return S.works[`${mid}::${ds}`]||[]}
function gaw(ds){let a=[];S.members.forEach(m=>gw(ds,m.id).forEach(w=>a.push({...w,memberId:m.id,memberName:m.name})));return a}

function dim(y,m){return new Date(y,m+1,0).getDate()}
function fdm(y,m){return new Date(y,m,1).getDay()}
function midx(mid){return S.members.findIndex(m=>m.id===mid)}
function projsOnDate(ds,memberIds){
  return S.projects.filter(p=>{
    if(ds<p.start||ds>p.end) return false;
    if(!memberIds) return true;
    return p.members.some(mid=>memberIds.includes(mid));
  });
}
function projsInMonth(y,m,memberIds){
  const s=dk(y,m,1),e=dk(y,m,dim(y,m));
  return S.projects.filter(p=>{
    if(p.start>e||p.end<s) return false;
    if(!memberIds) return true;
    return p.members.some(mid=>memberIds.includes(mid));
  });
}
function hexRgb(hex){const h=hex.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]}
function rgbToHex(c){
  // 이미 hex면 그대로 반환, rgb(...)이면 변환
  if(!c||c.startsWith('#')) return c;
  const m=c.match(/rgb[a]?\(\s*(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
  if(!m) return c;
  return'#'+[m[1],m[2],m[3]].map(v=>parseInt(v).toString(16).padStart(2,'0')).join('');
}
function stripeGradient(colors){
  if(!colors.length) return null;
  const hexColors=colors.map(rgbToHex);
  if(hexColors.length===1) return{bg:hexColors[0]+'40',single:true};
  const n=hexColors.length,stops=[];
  hexColors.forEach((c,i)=>{const a=Math.round((i/n)*100),b=Math.round(((i+1)/n)*100);stops.push(`${c}55 ${a}%`,`${c}55 ${b}%`)});
  return{bg:`linear-gradient(135deg,${stops.join(',')})`,single:false};
}

function handleProf(e, mid){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    S.memberPhotos[mid]=ev.target.result;
    lsSavePhotos();closeM();rSide();if(S.view==='team')rTeam();
    showProfile(mid);
  };
  reader.readAsDataURL(file);
}
function removePhoto(mid){S.memberPhotos[mid]=null;lsSavePhotos();closeM();rSide();if(S.view==='team')rTeam();showProfile(mid)}
function saveProfile(mid){
  const name=(document.getElementById('prof-name').value||'').trim();if(!name)return;
  const m=S.members.find(x=>x.id===mid);if(m)m.name=name;
  lsSave();closeM();rSide();if(S.view==='team')rTeam();if(S.view==='annual')rAnnual();
}
function delMember(mid){
  if(!confirm('팀원을 삭제할까요? 해당 팀원의 업무 데이터도 삭제됩니다.'))return;
  S.members=S.members.filter(m=>m.id!==mid);
  Object.keys(S.works).forEach(k=>{if(k.startsWith(mid+'::'))delete S.works[k]});
  delete S.memberPhotos[mid];
  S.projects.forEach(p=>{p.members=p.members.filter(id=>id!==mid)});
  lsSave();lsSavePhotos();closeM();rSide();if(S.view==='team')rTeam();
}

/* ── TEAM VIEW (Vocale-style week × member grid) ── */
function rTeam(){
  const el=document.getElementById('vt');
  const td=today();

  // Compute Monday of the offset week
  const base=new Date(td+'T00:00:00');
  base.setDate(base.getDate()+S.teamWeekOffset*7);
  const dow=base.getDay();
  const monday=new Date(base);
  monday.setDate(base.getDate()-(dow===0?6:dow-1));

  const weekDates=[];
  for(let i=0;i<7;i++){
    const dt=new Date(monday);dt.setDate(monday.getDate()+i);
    weekDates.push(dt.toISOString().slice(0,10));
  }

  const fmt=ds=>ds.slice(5).replace('-','/');
  const wLabel=`${weekDates[0].slice(0,4)}년  ${fmt(weekDates[0])} — ${fmt(weekDates[6])}`;
  const dayKR=['일','월','화','수','목','금','토'];

  const totalWorks=Object.values(S.works).reduce((s,a)=>s+a.length,0);
  const todayWorks=S.members.reduce((s,m)=>s+gw(td,m.id).length,0);
  const activeProjs=S.projects.filter(p=>p.start<=td&&p.end>=td).length;

  // Member column headers
  const memberHeads=S.members.map((m,i)=>{
    const c=ac(i);
    return`<th class="team-head-th">
      <div class="prof-av-btn" onclick="showProfile('${m.id}')" style="width:44px;height:44px;margin:0 auto 6px" title="프로필 설정">
        ${avHTML(m,44,14)}
        <div class="prof-av-overlay">설정</div>
      </div>
      <div class="mch-name">${m.name}</div>
    </th>`;
  }).join('');

  // Week rows
  const rows=weekDates.map((ds,di)=>{
    const isToday=ds===td;
    const cells=S.members.map(m=>{
      const ws=gw(ds,m.id);
      const projs=projsOnDate(ds,[m.id]);
      let cards='';
      projs.forEach(p=>{
        cards+=`<div class="tv-proj-card" style="background:${p.color}1A;border-left:3px solid ${p.color};color:${p.color};cursor:pointer" title="${p.name}" onclick="event.stopPropagation();openProjDetail('${p.id}')">${p.name}</div>`;
      });
      ws.forEach((w)=>{
        const cat=gc(w.catId);
        cards+=`<div class="tv-work-card" style="background:${cat.bg};color:${cat.t}">
          <span class="tv-card-cat">${cat.l}</span>
          <span class="tv-card-text">${w.text}</span>
        </div>`;
      });
      const memoKey=`memo::${m.id}::${ds}`;
      const hasMemo=S.memos&&S.memos[memoKey];
      const memoLines=hasMemo?S.memos[memoKey].split('\n').filter(l=>l.trim()).slice(0,4):[];
      const memoHint=memoLines.length?`<div class="tv-work-card" style="background:var(--bg-hover);color:var(--text-2);font-size:10px;border-left:2px solid var(--border);display:flex;flex-direction:column;gap:2px">✏️ ${memoLines.map(l=>`<div style='white-space:nowrap;overflow:hidden;text-overflow:ellipsis'>${l}</div>`).join('')}</div>`:'';
      const addHint=!cards&&!hasMemo?`<div class="tv-add-hint">+ 추가</div>`:'';
      return`<td class="team-cell${isToday?' is-today':''}" onclick="openDayPop('${m.id}','${ds}',event)">${cards}${memoHint}${addHint}</td>`;
    }).join('');
    return`<tr>
      <td class="day-label-td${isToday?' is-today':''}" style="${getHoliday(ds)?'background:#FFF5F5':''}">
        <div class="day-num" style="${getHoliday(ds)||new Date(ds+'T00:00:00').getDay()===0?'color:#EF4444':new Date(ds+'T00:00:00').getDay()===6?'color:#3B82F6':''}">${ds.slice(8)}</div>
        <div class="day-kr">${dayKR[new Date(ds+'T00:00:00').getDay()]}</div>
        ${getHoliday(ds)?`<div style="font-size:9px;color:#EF4444;font-weight:500">${getHoliday(ds)}</div>`:''}
      </td>
      ${cells}
    </tr>`;
  }).join('');

  el.innerHTML=`
    <div class="team-cal-topbar">
      <div class="tcal-nav-group">
        <button class="tcal-nav-btn" onclick="shiftTeamWeek(-1)">‹</button>
        <button class="tcal-nav-btn" onclick="shiftTeamWeek(1)">›</button>
        <span class="tcal-range">${wLabel}</span>
        <button class="tcal-today" onclick="resetTeamWeek()">오늘</button>
      </div>
      <div class="tcal-stats">
        <span class="tcal-stat"><b>${totalWorks}</b> 전체 업무</span>
        <span class="tcal-stat"><b>${todayWorks}</b> 오늘</span>
        <span class="tcal-stat"><b>${activeProjs}</b> 진행 프로젝트</span>
      </div>
    </div>
    <div class="team-cal-body">
      <table class="team-cal-table">
        <thead>
          <tr>
            <th class="team-head-corner"></th>
            ${memberHeads}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}


/* ── GANTT SCHEDULER ── */
let ganttRange=30;
let ganttOffset=0;

function rGantt(){
  const el=document.getElementById('vg');
  const td=today();
  const base=new Date(td+'T00:00:00');
  base.setDate(base.getDate()+ganttOffset);
  const startDate=new Date(base);
  const COL_W=ganttRange<=30?40:ganttRange<=90?26:16;

  const days=[];
  for(let i=0;i<ganttRange;i++){
    const d=new Date(startDate);d.setDate(startDate.getDate()+i);
    days.push(d.toISOString().slice(0,10));
  }
  const startStr=days[0],endStr=days[days.length-1];
  const fmt=ds=>`${ds.slice(5,7)}/${ds.slice(8)}`;
  const rangeLabel=`${startStr.slice(0,4)}년 ${fmt(startStr)} — ${fmt(endStr)}`;
  const dayKR=['일','월','화','수','목','금','토'];

  const headerCols=days.map(ds=>{
    const d=new Date(ds+'T00:00:00');const dow=d.getDay();
    const isToday=ds===td;const isWE=dow===0||dow===6;
    const holiH=getHoliday(ds);
    const showDow=ganttRange<=30;
    const showNum=ganttRange<=30||(ganttRange<=90&&d.getDate()%2===1)||d.getDate()===1||(ganttRange>90&&d.getDate()%5===1);
    const numLabel=ganttRange<=90?d.getDate():(d.getDate()===1?`${d.getMonth()+1}월`:'');
    return`<div class="gantt-day-col${isToday?' today':''}" style="width:${COL_W}px;min-width:${COL_W}px${holiH?';background:#FFF0F0':''}">
      ${showDow?`<div class="gantt-day-name" style="${holiH||dow===0?'color:#EF4444':dow===6?'color:#3B82F6':''}">${holiH?'●':dayKR[dow]}</div>`:''}
      ${showNum?`<div class="gantt-day-num" style="font-size:${ganttRange<=30?'11px':'10px'};${holiH||dow===0?'color:#EF4444':dow===6?'color:#3B82F6':isToday?'color:#2563EB':''}">${numLabel}</div>`:''}
    </div>`;
  }).join('');

  const allProjs=S.projects.filter(p=>p.start<=endStr&&p.end>=startStr);

  const memberRows=S.members.map((m,mi)=>{
    const c=ac(mi);
    const memberProjs=allProjs.filter(p=>p.members&&p.members.includes(m.id));

    const cells=days.map(ds=>{
      const d=new Date(ds+'T00:00:00');const dow=d.getDay();
      const isToday=ds===td;const isWE=dow===0||dow===6;
      const holiCell=getHoliday(ds);
      return`<div class="gantt-cell${isToday?' today':''}${isWE||holiCell?' weekend':''}" style="width:${COL_W}px;min-width:${COL_W}px${holiCell?';background:#FFF0F0':''}" ondblclick="openGanttAdd('${m.id}','${ds}')"></div>`;
    }).join('');

    const BAR_H=26, BAR_GAP=4, PAD=10;
    let slotIdx=0;
    const bars=memberProjs.flatMap((p)=>{
      const periods=p.periods&&p.periods.length?p.periods:[{start:p.start,end:p.end}];
      const dday=Math.ceil((new Date(p.end)-new Date(td))/(1000*60*60*24));
      const ddayStr=dday<0?`D+${Math.abs(dday)}`:dday===0?'D-Day':`D-${dday}`;
      return periods.map((period,pi)=>{
        const ps=period.start<startStr?startStr:period.start;
        const pe=period.end>endStr?endStr:period.end;
        const si=days.indexOf(ps),ei=days.indexOf(pe);
        if(si<0||ei<0){slotIdx++;return'';}
        const left=si*COL_W+2;
        const width=Math.max((ei-si+1)*COL_W-4,COL_W-4);
        const top=PAD+slotIdx*(BAR_H+BAR_GAP);
        const label=periods.length>1?`${p.name} (${pi+1}/${periods.length})`:p.name;
        slotIdx++;
        return`<div class="gantt-bar2" style="left:${left}px;width:${width}px;background:${p.color};color:#fff;top:${top}px;transform:none;position:absolute;height:${BAR_H}px${pi>0?';opacity:.75':''}"
          onclick="openProjDetail('${p.id}')" title="${label}">
          ${width>50?`<span style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:11px">${label}</span>`:''}
          ${width>100&&pi===periods.length-1?`<span style="font-size:10px;opacity:.85;flex-shrink:0">${ddayStr}</span>`:''}
        </div>`;
      }).filter(Boolean);
    });

    const totalSlots=memberProjs.reduce((s,p)=>{
      const periods=p.periods&&p.periods.length?p.periods:[{start:p.start,end:p.end}];
      return s+periods.length;
    },0)||0;
    const rowH=totalSlots===0?BAR_H+PAD*2:PAD+totalSlots*BAR_H+(totalSlots-1)*BAR_GAP+PAD;
    const photoSrc=S.memberPhotos&&S.memberPhotos[m.id];

    return{
      memberHTML:`<div class="gantt-member-row" style="height:${rowH}px" onclick="showProfile('${m.id}')">
        <div class="gantt-member-avatar" style="background:${c.bg};color:${c.t}">
          ${photoSrc?`<img src="${photoSrc}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:`${m.name.slice(0,2)}`}
        </div>
        <div>
          <div class="gantt-member-name">${m.name}</div>
          <div style="font-size:10px;color:var(--text-3)">${memberProjs.length}개</div>
        </div>
      </div>`,
      rowHTML:`<div class="gantt-row" style="height:${rowH}px;position:relative">
        ${cells}${bars.join('')}
      </div>`
    };
  });

  const unassignedProjs=allProjs.filter(p=>!p.members||p.members.length===0);
  let unassignedMember='',unassignedRow='';
  if(unassignedProjs.length){
    const ubars=unassignedProjs.map((p,pi)=>{
      const ps=p.start<startStr?startStr:p.start;const pe=p.end>endStr?endStr:p.end;
      const si=days.indexOf(ps),ei=days.indexOf(pe);if(si<0||ei<0)return'';
      const left=si*COL_W+2,width=Math.max((ei-si+1)*COL_W-4,COL_W-4),top=8+pi*34;
      return`<div class="gantt-bar2" style="left:${left}px;width:${width}px;background:${p.color};color:#fff;top:${top}px;transform:none;position:absolute;height:28px;opacity:.6"
        onclick="openProjDetail('${p.id}')" title="${p.name}">
        ${width>50?`<span style="font-size:11px;font-weight:600">${p.name}</span>`:''}
      </div>`;
    });
    const rowH=Math.max(52,unassignedProjs.length*34+12);
    const ucells=days.map(ds=>{
      const d=new Date(ds+'T00:00:00');const dow=d.getDay();
      return`<div class="gantt-cell${ds===td?' today':''}${dow===0||dow===6?' weekend':''}" style="width:${COL_W}px;min-width:${COL_W}px"></div>`;
    }).join('');
    unassignedMember=`<div class="gantt-member-row" style="height:${rowH}px;opacity:.6">
      <div class="gantt-member-avatar" style="background:#ddd;color:#888;font-size:10px">미배정</div>
      <div><div class="gantt-member-name" style="color:var(--text-2)">미배정</div></div>
    </div>`;
    unassignedRow=`<div class="gantt-row" style="height:${rowH}px;position:relative">${ucells}${ubars.join('')}</div>`;
  }

  const membersHTML=`<div class="gantt-member-row" style="height:20px;border-bottom:1px solid var(--border-light)"></div>`+memberRows.map(r=>r.memberHTML).join('')+unassignedMember;
  const rowsHTML=memberRows.map(r=>r.rowHTML).join('')+unassignedRow;

  el.innerHTML=`
    ${buildAiPanel()}
    <div class="gantt-toolbar">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="gantt-nav-btn" onclick="ganttOffset-=ganttRange;rGantt()">‹</button>
        <button class="gantt-nav-btn" onclick="ganttOffset=0;rGantt()">오늘</button>
        <button class="gantt-nav-btn" onclick="ganttOffset+=ganttRange;rGantt()">›</button>
        <span style="font-size:13px;font-weight:600;color:var(--text);margin-left:4px">${rangeLabel}</span>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="gantt-range-btn${ganttRange===30?' on':''}" onclick="ganttRange=30;rGantt()">1개월</button>
        <button class="gantt-range-btn${ganttRange===90?' on':''}" onclick="ganttRange=90;rGantt()">3개월</button>
        <button class="gantt-range-btn${ganttRange===150?' on':''}" onclick="ganttRange=150;rGantt()">5개월</button>
        <button class="gantt-range-btn${ganttRange===365?' on':''}" onclick="ganttRange=365;rGantt()">12개월</button>
        <button class="gantt-range-btn" style="background:var(--accent);color:#fff;border-color:var(--accent)" onclick="openAddProjModal()">+ 프로젝트 추가</button>
      </div>
    </div>
    <div class="gantt-wrap">
      <div class="gantt-members">
        <div class="gantt-member-header">팀원 (${S.members.length}명)</div>
        ${membersHTML}
      </div>
      <div class="gantt-chart" id="gantt-chart-scroll">
        <div class="gantt-header">${headerCols}</div>
        <div class="gantt-rows">${rowsHTML}</div>
      </div>
    </div>`;

  setTimeout(()=>{
    const sc=document.getElementById('gantt-chart-scroll');
    if(sc&&ganttOffset===0){
      const todayIdx=days.indexOf(td);
      if(todayIdx>0)sc.scrollLeft=Math.max(0,(todayIdx-3)*COL_W);
    }
  },50);
}

  const swatches=PROJ_COLORS.map((c,i)=>`<div class="cp-swatch${i===0?' on':''}" style="background:${c}" data-color="${c}" onclick="pickColor(this)"></div>`).join('')+`<input type="color" class="cp-custom" title="직접 선택" value="#378ADD" oninput="pickColorCustom(this)">`;

function addProjFromGantt(){
  const name=(document.getElementById('pn').value||'').trim();if(!name)return;
  const _sw=document.querySelector('.cp-swatch.on');const color=_sw?(_sw.dataset.color||rgbToHex(_sw.style.background)):PROJ_COLORS[0];
  const start=document.getElementById('ps').value,end=document.getElementById('pe').value;
  const members=[...document.querySelectorAll('input[name="pm"]:checked')].map(el=>el.value);
  const categories=[...document.querySelectorAll('input[name="pc"]:checked')].map(el=>el.value);
  if(!members.length){alert('팀원을 1명 이상 선택해주세요');return}
  S.projects.push({id:'p'+Date.now(),name,color,start,end,members,categories});
  lsSave();closeM();rGantt();rProject();rAnnual();
}

function openEditProjModal(pid){
  const p=S.projects.find(x=>x.id===pid);if(!p)return;
  const catRows=S.categories.map(cat=>`<label class="mc-row"><input type="checkbox" name="pc" value="${cat.id}"${p.categories&&p.categories.includes(cat.id)?' checked':''}><div class="cdot" style="background:${cat.hx};width:9px;height:9px;flex-shrink:0"></div><span style="font-size:12px">${cat.l}</span></label>`).join('');
  const memberRows=S.members.map(m=>`<label class="mc-row"><input type="checkbox" name="pm" value="${m.id}"${p.members&&p.members.includes(m.id)?' checked':''}>${avHTML(m,22,9)}<span style="font-size:12px">${m.name}</span></label>`).join('');
  const swatches=PROJ_COLORS.map((c,i)=>`<div class="cp-swatch${c===p.color?' on':''}" style="background:${c}" data-color="${c}" onclick="pickColor(this)"></div>`).join('')+`<input type="color" class="cp-custom" title="직접 선택" value="${p.color}" oninput="pickColorCustom(this)">`;
  document.getElementById('mc').innerHTML=`<div class="modal-ov" onclick="if(event.target===this)closeM()"><div class="modal" style="width:400px"><div class="modal-title">프로젝트 수정</div>
    <div class="modal-field"><label>프로젝트명</label><input id="pn" value="${p.name}"></div>
    <div class="modal-field"><label>색상</label><div class="color-picker" id="cp">${swatches}</div></div>
    <div class="modal-field"><label>시작일</label><input id="ps" type="date" value="${p.start}"></div>
    <div class="modal-field"><label>종료일</label><input id="pe" type="date" value="${p.end}"></div>
    <div class="modal-field"><label>팀원</label><div class="member-check-grid">${memberRows}</div></div>
    <div class="modal-field"><label>카테고리</label><div class="member-check-grid">${catRows}</div></div>
    <div class="modal-btns">
      <button class="mbtn danger" onclick="deleteProjFromGantt('${pid}')">삭제</button>
      <button class="mbtn" onclick="closeM()">취소</button>
      <button class="mbtn p" onclick="saveEditProjFromGantt('${pid}')">저장</button>
    </div></div></div>`;
}

function saveEditProjFromGantt(pid){
  const p=S.projects.find(x=>x.id===pid);if(!p)return;
  const name=(document.getElementById('pn').value||'').trim();if(!name)return;
  const _sw=document.querySelector('.cp-swatch.on');
  p.color=_sw?(_sw.dataset.color||rgbToHex(_sw.style.background)):p.color;
  p.name=name;
  p.start=document.getElementById('ps').value;
  p.end=document.getElementById('pe').value;
  p.members=[...document.querySelectorAll('input[name="pm"]:checked')].map(el=>el.value);
  p.categories=[...document.querySelectorAll('input[name="pc"]:checked')].map(el=>el.value);
  lsSave();closeM();rGantt();rProject();rAnnual();
}

function deleteProjFromGantt(pid){
  if(!confirm('프로젝트를 삭제할까요?'))return;
  S.projects=S.projects.filter(x=>x.id!==pid);
  lsSave();closeM();rGantt();rProject();rAnnual();
}

/* ── member filter pills ── */

  let pills=`<div class="member-filter"><span style="font-size:11px;color:var(--text-2);white-space:nowrap">필터:</span>

/* ── ANNUAL ── */
function rAnnual(){
  const el=document.getElementById('va');
  document.getElementById('vt-year')?.classList.toggle('on',S.annualMode==='year');
  document.getElementById('vt-month')?.classList.toggle('on',S.annualMode==='month');
  if(S.annualMode==='year'){
    rGanttInto(el);
  } else {
    rMonthly(el,'');
  }
}

// Render gantt into any element (used for annual view embedding)
function rGanttInto(el){
  const td=today();
  const base=new Date(td+'T00:00:00');
  base.setDate(base.getDate()+ganttOffset);
  const startDate=new Date(base);
  const COL_W=ganttRange<=30?40:ganttRange<=90?26:16;
  const BAR_H=26,PAD=9,ROW_H=BAR_H+PAD*2;

  const days=[];
  for(let i=0;i<ganttRange;i++){
    const d=new Date(startDate);d.setDate(startDate.getDate()+i);
    days.push(d.toISOString().slice(0,10));
  }
  const startStr=days[0],endStr=days[days.length-1];
  const fmt=ds=>`${ds.slice(5,7)}/${ds.slice(8)}`;
  const rangeLabel=`${startStr.slice(0,4)}년 ${fmt(startStr)} — ${fmt(endStr)}`;
  const dayKR=['일','월','화','수','목','금','토'];

  function getStatus(p){
    const d=Math.ceil((new Date(p.end)-new Date(td))/86400000);
    if(d<0)return{l:'완료',bg:'#DCFCE7',c:'#16A34A'};
    if(d===0)return{l:'D-Day',bg:'#FEF9C3',c:'#CA8A04'};
    if(d<=7)return{l:'마감임박',bg:'#FEE2E2',c:'#DC2626'};
    return{l:'진행중',bg:'#DBEAFE',c:'#2563EB'};
  }

  // Flat rows
  const rows=[];
  S.members.forEach((m,mi)=>{
    const projs=S.projects.filter(p=>p.start<=endStr&&p.end>=startStr&&p.members&&p.members.includes(m.id));
    if(!projs.length) rows.push({m,mi,p:null,first:true,span:1,last:true});
    else projs.forEach((p,pi)=>rows.push({m,mi,p,first:pi===0,span:projs.length,last:pi===projs.length-1}));
  });

  // Header
  const thCols=days.map(ds=>{
    const d=new Date(ds+'T00:00:00'),dow=d.getDay();
    const isToday=ds===td,holi=getHoliday(ds);
    const showDow=ganttRange<=30;
    const showNum=ganttRange<=30||(ganttRange<=90&&d.getDate()%2===1)||d.getDate()===1||(ganttRange>90&&d.getDate()%5===1);
    return`<th style="width:${COL_W}px;min-width:${COL_W}px;height:48px;padding:2px 0;text-align:center;vertical-align:middle;border-right:1px solid var(--border-light);border-bottom:2px solid var(--border-light);background:${holi?'#FFF0F0':isToday?'#EFF6FF':'var(--bg-hover)'};font-weight:400">
      ${showDow?`<div style="font-size:9px;color:${holi||dow===0?'#EF4444':dow===6?'#3B82F6':'var(--text-2)'}">${dayKR[dow]}</div>`:''}
      ${showNum?`<div style="font-size:10px;font-weight:600;color:${holi||dow===0?'#EF4444':dow===6?'#3B82F6':isToday?'#2563EB':'var(--text)'}">${ganttRange<=90?d.getDate():d.getDate()===1?`${d.getMonth()+1}월`:''}</div>`:''}
    </th>`;
  }).join('');

  // Body
  const bodyRows=rows.map(({m,mi,p,first,span,last})=>{
    const c=ac(mi);
    const photoSrc=S.memberPhotos&&S.memberPhotos[m.id];
    const bb=last?'2px':'1px';

    const memberTd=first?`<td rowspan="${span}" style="width:90px;min-width:90px;padding:0 8px;border-right:1px solid var(--border-light);border-bottom:${bb} solid var(--border-light);background:var(--bg);position:sticky;left:0;z-index:2;vertical-align:middle">
      <div style="display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden">
        ${photoSrc?`<img src="${photoSrc}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0">`:
          `<div style="width:24px;height:24px;border-radius:50%;background:${c.bg};color:${c.t};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">${m.name.slice(0,2)}</div>`}
        <span style="font-size:12px;font-weight:600">${m.name}</span>
      </div>
    </td>`:'';

    if(!p){
      return`<tr style="height:${ROW_H}px">${memberTd}
        <td colspan="${days.length+2}" style="border-bottom:2px solid var(--border-light);padding:0 8px;color:var(--text-3);font-size:11px;background:var(--bg)">프로젝트 없음</td>
      </tr>`;
    }

    const status=getStatus(p);
    const dday=Math.ceil((new Date(p.end)-new Date(td))/86400000);
    const ddStr=dday<0?`D+${Math.abs(dday)}`:dday===0?'D-Day':`D-${dday}`;
    const ps=p.start<startStr?startStr:p.start;
    const pe=p.end>endStr?endStr:p.end;
    const si=days.indexOf(ps),ei=days.indexOf(pe);

    // Build date cells — inject bar into first in-range cell using colspan trick
    let dateCells='';
    if(si<0||ei<0){
      // No bar visible in range
      dateCells=days.map(ds=>{
        const d=new Date(ds+'T00:00:00'),dow=d.getDay(),holi=getHoliday(ds);
        return`<td style="width:${COL_W}px;border-right:1px solid var(--border-light);border-bottom:${bb} solid var(--border-light);background:${holi?'#FFF0F050':dow===0||dow===6?'rgba(0,0,0,.025)':ds===td?'#EFF6FF40':''}"></td>`;
      }).join('');
    } else {
      // Before bar
      for(let i=0;i<si;i++){
        const ds=days[i],d=new Date(ds+'T00:00:00'),dow=d.getDay(),holi=getHoliday(ds);
        dateCells+=`<td style="width:${COL_W}px;border-right:1px solid var(--border-light);border-bottom:${bb} solid var(--border-light);background:${holi?'#FFF0F050':dow===0||dow===6?'rgba(0,0,0,.025)':ds===td?'#EFF6FF40':''}"></td>`;
      }
      // Bar cell (colspan)
      const barCols=ei-si+1;
      const barW=barCols*COL_W-4;
      dateCells+=`<td colspan="${barCols}" style="padding:${PAD}px 2px;border-right:1px solid var(--border-light);border-bottom:${bb} solid var(--border-light);background:${days[si]===td?'#EFF6FF40':''}">
        <div style="height:${BAR_H}px;background:${p.color}22;color:${p.color};border-left:3px solid ${p.color};border-radius:0 13px 13px 0;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;overflow:hidden;cursor:pointer;gap:6px;box-sizing:border-box" onclick="openProjDetail('${p.id}')">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${p.name}</span>
          ${barW>80?`<span style="font-size:10px;opacity:.7;flex-shrink:0">${ddStr}</span>`:''}
        </div>
      </td>`;
      // After bar
      for(let i=ei+1;i<days.length;i++){
        const ds=days[i],d=new Date(ds+'T00:00:00'),dow=d.getDay(),holi=getHoliday(ds);
        dateCells+=`<td style="width:${COL_W}px;border-right:1px solid var(--border-light);border-bottom:${bb} solid var(--border-light);background:${holi?'#FFF0F050':dow===0||dow===6?'rgba(0,0,0,.025)':ds===td?'#EFF6FF40':''}"></td>`;
      }
    }

    return`<tr style="height:${ROW_H}px">${memberTd}
      <td style="min-width:140px;padding:0 8px;border-right:1px solid var(--border-light);border-bottom:${bb} solid var(--border-light);background:var(--bg);position:sticky;left:90px;z-index:2;font-size:12px;cursor:pointer" onclick="openProjDetail('${p.id}')">${p.name}</td>
      <td style="width:72px;min-width:72px;padding:4px 6px;border-right:2px solid var(--border-light);border-bottom:${bb} solid var(--border-light);background:var(--bg);position:sticky;left:230px;z-index:2;text-align:center">
        <span style="background:${status.bg};color:${status.c};padding:2px 6px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap">${status.l}</span>
      </td>
      ${dateCells}
    </tr>`;
  }).join('');

  // Mini cals
  const seen=new Set(),months=[];
  days.forEach(ds=>{const mo=ds.slice(0,7);if(!seen.has(mo)){seen.add(mo);months.push(mo);}});
  const miniCalHTML=months.slice(0,ganttRange<=30?1:ganttRange<=90?3:5).map(ym=>{
    const[y,m]=ym.split('-').map(Number);
    const fd=new Date(y,m-1,1).getDay(),ld=new Date(y,m,0).getDate(),dk2=['일','월','화','수','목','금','토'];
    let cls='';for(let i=0;i<fd;i++)cls+=`<div></div>`;
    for(let d=1;d<=ld;d++){
      const ds=`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dow=new Date(ds+'T00:00:00').getDay(),isT=ds===td,h=getHoliday(ds);
      cls+=`<div style="text-align:center;font-size:11px;color:${isT?'#fff':h||dow===0?'#EF4444':dow===6?'#3B82F6':'var(--text)'};background:${isT?'var(--accent)':''};border-radius:50%;width:22px;height:22px;line-height:22px;margin:auto">${d}</div>`;
    }
    return`<div style="background:var(--bg);border:1px solid var(--border-light);border-radius:var(--radius);padding:12px;min-width:200px">
      <div style="font-size:12px;font-weight:600;text-align:center;margin-bottom:8px">${y}년 ${m}월</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">${dk2.map((d,i)=>`<div style="text-align:center;font-size:10px;font-weight:500;color:${i===0?'#EF4444':i===6?'#3B82F6':'var(--text-2)'}">${d}</div>`).join('')}</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${cls}</div>
    </div>`;
  }).join('');

  el.innerHTML=`
    ${buildAiPanel()}
    <div class="gantt-toolbar">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="gantt-nav-btn" onclick="ganttOffset-=ganttRange;rAnnual()">‹</button>
        <button class="gantt-nav-btn" onclick="ganttOffset=0;rAnnual()">오늘</button>
        <button class="gantt-nav-btn" onclick="ganttOffset+=ganttRange;rAnnual()">›</button>
        <span style="font-size:13px;font-weight:600;color:var(--text);margin-left:4px">${rangeLabel}</span>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="gantt-range-btn${ganttRange===30?' on':''}" onclick="ganttRange=30;rAnnual()">1개월</button>
        <button class="gantt-range-btn${ganttRange===90?' on':''}" onclick="ganttRange=90;rAnnual()">3개월</button>
        <button class="gantt-range-btn${ganttRange===150?' on':''}" onclick="ganttRange=150;rAnnual()">5개월</button>
        <button class="gantt-range-btn${ganttRange===365?' on':''}" onclick="ganttRange=365;rAnnual()">12개월</button>
        <button class="gantt-range-btn" style="background:var(--accent);color:#fff;border-color:var(--accent)" onclick="openAddProjModal()">+ 프로젝트 추가</button>
      </div>
    </div>
    <div style="flex:1;overflow:auto">
      <table style="border-collapse:collapse;width:max-content">
        <thead><tr>
          <th style="width:90px;min-width:90px;height:48px;padding:0 8px;border-right:1px solid var(--border-light);border-bottom:2px solid var(--border-light);background:var(--bg-hover);text-align:left;font-size:11px;font-weight:600;color:var(--text-2);position:sticky;left:0;z-index:5">담당자</th>
          <th style="min-width:140px;height:48px;padding:0 8px;border-right:1px solid var(--border-light);border-bottom:2px solid var(--border-light);background:var(--bg-hover);text-align:left;font-size:11px;font-weight:600;color:var(--text-2);position:sticky;left:90px;z-index:5">작품명</th>
          <th style="width:72px;min-width:72px;height:48px;padding:0 6px;border-right:2px solid var(--border-light);border-bottom:2px solid var(--border-light);background:var(--bg-hover);text-align:center;font-size:11px;font-weight:600;color:var(--text-2);position:sticky;left:230px;z-index:5">진행여부</th>
          ${thCols}
        </tr></thead>
        <tbody>${bodyRows}</tbody>
      </table>
    </div>
    <div style="display:flex;gap:12px;padding:16px;overflow-x:auto;border-top:1px solid var(--border-light);flex-wrap:wrap">${miniCalHTML}</div>`;

  setTimeout(()=>{
    const wrap=el.querySelector('div[style*="overflow:auto"]');
    if(wrap&&ganttOffset===0){const ti=days.indexOf(td);if(ti>3)wrap.scrollLeft=(ti-3)*COL_W;}
  },50);
}

function rYearly(el,toggleHTML){
  const filterIds=getFilterIds(),td=today();
  const showPerMember=S.annualFilter.size>0;
  if(showPerMember){
    const targetMembers=S.members.filter(m=>S.annualFilter.has(m.id));
    let sections='';
    targetMembers.forEach(mm=>{
      const mi=midx(mm.id),c=ac(mi);
      const myProjs=S.projects.filter(p=>p.members.includes(mm.id));
      const projPills=myProjs.map(p=>`<span class="mas-pill" style="background:${p.color}20;color:${p.color}">${p.name}</span>`).join('');
      let monthBlocks='';

        const days=dim(S.year,m),fd=fdm(S.year,m);

          const evts2=S.events.filter(e=>e.date===ds);

          const projDots2=projs.length?`<div class="mas-dc-proj-dots">${projs.map(p=>`<div class="mas-dc-proj-item"><div class="mas-dc-proj-dot" style="background:${p.color}"></div><span class="mas-dc-proj-name" style="color:${p.color}">${p.name}</span></div>`).join('')}</div>`:'';
          cells+=`<div class="mas-dc${isTod?' tod':''}${hw?' hw':''}" onclick="openEvtPop('${ds}',event)" title="${projs.map(p=>p.name).join(', ')||ds}${ws.length?' | '+ws.length+'건':''}${evts2.length?' 📌'+evts2.map(e=>e.title).join(', '):''}">
            <div class="mas-dc-num">${d}</div>

          </div>`;

        monthBlocks+=`<div class="mas-mb" onclick="openMonth(${m})">

        </div>`;
      }
      sections+=`<div class="member-annual-section">
        <div class="mas-header">
          <div onclick="showProfile('${mm.id}')" style="cursor:pointer" class="prof-av-btn">${avHTML(mm,28,10)}<div class="prof-av-overlay" style="font-size:9px">설정</div></div>
          <span class="mas-name">${mm.name}</span>
          <div class="mas-proj-pills">${projPills}</div>
        </div>
        <div class="mas-grid">${monthBlocks}</div>
      </div>`;
    });
    el.innerHTML=`<div class="annual-wrap">

        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">${memberFilterHTML()}${toggleHTML}</div>

      <div style="margin-bottom:14px"><div class="proj-legend-inline">${buildLegend(filterIds)}</div></div>
      ${sections}
      ${buildEvtList(S.year)}
    </div>`;
  } else {
    const td2=today();let months='';
    for(let m=0;m<12;m++){
      const days=dim(S.year,m),fd=fdm(S.year,m);
      let cells='';for(let i=0;i<fd;i++) cells+=`<div></div>`;
      let mWorkCnt=0;
      for(let d=1;d<=days;d++){
        const ds=dk(S.year,m,d);
        const ws=filterIds?filterIds.flatMap(mid=>gw(ds,mid)):gaw(ds);

        const isTod=ds===td2,hw=ws.length>0;
        const catCounts={};ws.forEach(w=>{catCounts[w.catId]=(catCounts[w.catId]||0)+1});
        const catBar=Object.entries(catCounts).map(([cid,cnt])=>`<div class="day-cat-seg" style="background:${gc(cid).hx};flex:${cnt}"></div>`).join('');
        const evts=S.events.filter(e=>e.date===ds);
        const evtDot=evts.length===1
          ?`<div class="day-evt-dot" style="background:${evts[0].color}"></div>`
          :evts.length>1?`<div class="day-evt-multi">${evts.length}</div>`:'';
        const title=projs.map(p=>p.name).join(', ')+(ws.length?' | '+ws.length+'건':'')+(evts.length?' 📌'+evts.map(e=>e.title).join(', '):'');
        const projDots=projs.length?`<div class="dc-proj-dots">${projs.map(p=>`<div class="dc-proj-item"><div class="dc-proj-dot" style="background:${p.color}"></div><span class="dc-proj-name" style="color:${p.color}">${p.name}</span></div>`).join('')}</div>`:'';
        cells+=`<div class="dc${isTod?' tod':''}${hw?' hw':''}" onclick="openEvtPop('${ds}',event)" title="${title||ds}">
          <span class="dc-num">${d}</span>
          ${projDots}
          ${evtDot}
          ${hw?`<div class="day-cat-bar">${catBar}</div>`:''}
        </div>`;
      }
      months+=`<div class="mb" onclick="openMonth(${m})">
        <div class="mb-title">${MONTHS[m]}<span class="mb-cnt">${mWorkCnt?mWorkCnt+'건':''}</span></div>
        <div class="dg">${DAYS.map(l=>`<div class="dl">${l}</div>`).join('')}${cells}</div>
      </div>`;
    }
    el.innerHTML=`<div class="annual-wrap">
      <div class="annual-header">
        <div style="font-size:14px;font-weight:600">${S.year}년</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">${memberFilterHTML()}${toggleHTML}</div>
      </div>
      ${buildAiPanel()}
      <div style="margin-bottom:14px"><div class="proj-legend-inline">${buildLegend(filterIds)}</div></div>
      <div class="annual-grid">${months}</div>
      ${buildEvtList(S.year)}
    </div>`;
  }
}
